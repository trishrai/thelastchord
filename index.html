<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Last Chord</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:italic,bold&family=Inter:wght=300;400;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.4s ease; }
        .font-serif { font-family: 'Libre Baskerville', serif; }
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(0, 31, 63, 0.2); border-radius: 10px; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeInUp 1.0s ease-out forwards; }
    </style>
</head>
<body class="bg-[#D1E2F2] text-[#001F3F]">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState('Home');
            const [formData, setFormData] = useState({ firstName: '', lastName: '', city: 'London', email: '' });
            const [signupStatus, setSignupStatus] = useState('idle');
            
            // PASTE YOUR URL HERE
            const NEWSLETTER_SCRIPT_URL = "YOUR_GOOGLE_WEB_APP_URL_HERE";

            const handleFormChange = (e) => {
                setFormData({ ...formData, [e.target.name]: e.target.value });
            };

            const handleSubscribe = async (e) => {
                e.preventDefault();
                setSignupStatus('loading');
                try {
                    // Script will now send City before Email to match your requested sheet order
                    await fetch(NEWSLETTER_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(formData)
                    });
                    setSignupStatus('success');
                } catch (error) { setSignupStatus('error'); }
            };

            return (
                <div className="min-h-screen p-8 md:p-20 max-w-4xl mx-auto">
                    <header className="mb-16 animate-fade-in">
                        <h1 className="text-5xl font-serif italic tracking-tighter">THE LAST CHORD</h1>
                        <p className="text-[10px] uppercase tracking-[0.4em] font-bold opacity-60 mt-2">BY TRISHA RAI | EST. 2025</p>
                    </header>

                    <section className="mb-20 space-y-12 animate-fade-in">
                        <div>
                            <h2 className="text-2xl font-serif italic mb-4">About The Last Chord</h2>
                            <p className="text-sm leading-relaxed font-light opacity-80">
                                Launched in February 2025, The Last Chord is a digital sanctuary exploring the intersection of technology and culture. From dissecting London’s vibrant arts scene to critical think-pieces on AI’s societal evolution, we provide nuanced debates and a holistic understanding of our digital age. Every word is researched and written to bridge the gap between complex digital shifts and human-centric storytelling.
                            </p>
                        </div>

                        <div className="bg-white/30 p-8">
                            <h2 className="text-2xl font-serif italic mb-4">About the Founder</h2>
                            <p className="text-sm leading-relaxed font-light opacity-80">
                                Founded by Trisha Rai, The Last Chord is dedicated to exploring the intersection of technology, culture, and daily life. Born in India and raised in Hong Kong, Rai moved to London in 2020 to study at the LSE, where she became captivated by technology's role in shaping human experience. Currently pursuing a Master’s in Digital Humanities at UCL, Rai researches the evolving relationship between tech, culture, and AI. This entire web platform was personally coded, built, and developed by Rai.
                            </p>
                        </div>
                    </section>

                    <section className="border-t border-[#001F3F]/20 pt-16">
                        <h3 className="text-xl font-serif italic mb-8">Join the Registry</h3>
                        <form onSubmit={handleSubscribe} className="space-y-6">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <input name="firstName" placeholder="First Name" onChange={handleFormChange} className="bg-transparent border-b border-[#001F3F]/30 py-2 outline-none" required />
                                <input name="lastName" placeholder="Last Name" onChange={handleFormChange} className="bg-transparent border-b border-[#001F3F]/30 py-2 outline-none" required />
                                <select name="city" onChange={handleFormChange} className="bg-transparent border-b border-[#001F3F]/30 py-2 outline-none">
                                    <option value="London">London</option>
                                    <option value="Hong Kong">Hong Kong</option>
                                    <option value="Delhi">Delhi</option>
                                    <option value="Other">Other</option>
                                </select>
                                <input name="email" type="email" placeholder="Email Address" onChange={handleFormChange} className="bg-transparent border-b border-[#001F3F]/30 py-2 outline-none" required />
                            </div>
                            <button type="submit" className="text-[10px] uppercase tracking-[0.3em] font-bold py-4 px-8 border border-[#001F3F] hover:bg-[#001F3F] hover:text-white transition-all">
                                {signupStatus === 'loading' ? 'Syncing...' : 'Subscribe'}
                            </button>
                        </form>
                    </section>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
