<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Last Chord</title>
    
    <link rel="apple-touch-icon" href="https://trishrai.github.io/thelastchord/Logo.jpeg">
    <link rel="icon" type="image/jpeg" href="https://trishrai.github.io/thelastchord/Logo.jpeg">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="The Last Chord">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:italic,bold&family=Inter:wght=300;400;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; transition: background-color 0.4s ease, color 0.4s ease; }
        .font-serif { font-family: 'Libre Baskerville', serif; }
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(0, 31, 63, 0.2); border-radius: 10px; }
        .grid-layout { gap: 1px !important; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeInUp 1.2s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState(() => {
                return localStorage.getItem('tlc_active_tab') || 'Home';
            });
            
            const [darkMode, setDarkMode] = useState(() => {
                return localStorage.getItem('tlc_dark_mode') === 'true';
            });

            const [favorites, setFavorites] = useState(() => {
                const cachedData = localStorage.getItem('tlc_favorites_v2');
                return cachedData ? JSON.parse(cachedData) : [];
            });

            const [searchQuery, setSearchQuery] = useState('');
            const [viewingCollection, setViewingCollection] = useState(false);
            const [collectionSubFilter, setCollectionSubFilter] = useState('All');
            const [selectedCategory, setSelectedCategory] = useState('Landing'); 
            const [sortOrder, setSortOrder] = useState('newest'); 
            const [hoveredCategory, setHoveredCategory] = useState(null); 
            const [data, setData] = useState({ Songs: [], London: [], Articles: [], Tech: [] });

            const CSV_LINKS = {
                Songs: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSyk-CW-uRScOp42schBcPTBMBIfu8RtGJtDlNkmn2fHnvqoI5GiXKEYiYv62nzVk6aemxQp7cdCamh/pub?gid=0&single=true&output=csv",
                London: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSyk-CW-uRScOp42schBcPTBMBIfu8RtGJtDlNkmn2fHnvqoI5GiXKEYiYv62nzVk6aemxQp7cdCamh/pub?gid=1791301794&single=true&output=csv",
                Articles: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSyk-CW-uRScOp42schBcPTBMBIfu8RtGJtDlNkmn2fHnvqoI5GiXKEYiYv62nzVk6aemxQp7cdCamh/pub?gid=116420010&single=true&output=csv",
                Tech: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSyk-CW-uRScOp42schBcPTBMBIfu8RtGJtDlNkmn2fHnvqoI5GiXKEYiYv62nzVk6aemxQp7cdCamh/pub?gid=1956240315&single=true&output=csv"
            };

            const CATEGORY_MAP = {
                "The Last Chord": {
                    title: "The Last Chord",
                    pillBg: "bg-[#DDEBFA]", pillText: "text-[#1E40AF]",
                    desc: "Welcome to The Last Chord. Read about us here."
                },
                "Off The Record: Opinion Pieces": {
                    title: "Off The Record: Opinion Pieces",
                    pillBg: "bg-[#E2F0D9]", pillText: "text-[#2E7D32]",
                    desc: "Welcome to Off the Record, where art meets insight. We offer sharp, unfiltered opinion pieces on cultural shifts, the evolution of sound, and the timeless debates shaping the industry."
                },
                "The Sonic Lens: Analysis": {
                    title: "The Sonic Lens: Analysis",
                    pillBg: "bg-[#F3E5F5]", pillText: "text-[#6A1B9A]",
                    desc: "Welcome to The Sonic Lens. We examine the intersection of art, culture, and society through a critical eye. From the evolution of musical traditions to the impact of iconic movements, we offer thought-provoking analysis on how art shapes our world."
                },
                "Studio Sessions: Interviews": {
                    title: "Studio Sessions: Interviews",
                    pillBg: "bg-[#E0F2F1]", pillText: "text-[#00695C]",
                    desc: "Welcome to Studio Sessions, where creativity meets conversation. We interview musicians, writers, and visual creators to uncover the stories behind their art. Dive deep into the processes, struggles, and passions that drive the creative world."
                },
                "Soundcheck: Reviews": {
                    title: "Soundcheck: Reviews",
                    pillBg: "bg-[#FCE4EC]", pillText: "text-[#C2185B]",
                    desc: "Welcome to Soundcheck, the reviews section of The Last Chord. We cover albums, films, art, and culture that leave a mark. Beyond simple critiques, we unpack the storytelling, rebellion, and raw emotion behind every piece."
                }
            };

            useEffect(() => {
                localStorage.setItem('tlc_active_tab', activeTab);
                setSearchQuery(''); 
                if (activeTab === 'Articles') {
                    setSelectedCategory('Landing'); 
                }
            }, [activeTab]);

            useEffect(() => {
                localStorage.setItem('tlc_dark_mode', darkMode);
            }, [darkMode]);

            useEffect(() => {
                localStorage.setItem('tlc_favorites_v2', JSON.stringify(favorites));
            }, [favorites]);

            useEffect(() => {
                Object.keys(CSV_LINKS).forEach(key => {
                    Papa.parse(CSV_LINKS[key], {
                        download: true, header: true, skipEmptyLines: true,
                        complete: (results) => {
                            const cleanData = results.data.map(row => {
                                const newRow = {};
                                Object.keys(row).forEach(k => { newRow[k.toLowerCase().trim()] = row[k]; });
                                return newRow;
                            });
                            setData(prev => ({ ...prev, [key]: cleanData.reverse() }));
                        }
                    });
                });
            }, []);

            const theme = {
                bg: darkMode ? 'bg-[#121212]' : 'bg-[#D1E2F2]',
                navBg: darkMode ? 'bg-[#121212]/90' : 'bg-[#D1E2F2]/90',
                footerBg: darkMode ? 'bg-[#121212]/95' : 'bg-[#D1E2F2]/95',
                text: darkMode ? 'text-[#F5EFE6]' : 'text-[#001F3F]',
                border: darkMode ? 'border-[#F5EFE6]/10' : 'border-[#001F3F]/10',
                pillBorder: darkMode ? 'border-[#F5EFE6]' : 'border-[#001F3F]',
                cardBg: darkMode ? 'bg-[#1C1C1E]' : 'bg-white',
                layoutGrid: darkMode ? 'bg-[#F5EFE6]/10' : 'bg-[#001F3F]/10',
                placeholderBg: darkMode ? 'bg-[#F5EFE6]/5' : 'bg-[#001F3F]/5'
            };

            const getPageHeader = (tab) => {
                if (viewingCollection) return "YOUR MASTER COLLECTION DECK";
                if (tab === 'Home') return "ABOUT THE LAST CHORD";
                switch(tab) {
                    case 'Songs': return "SONG RECOMMENDATIONS FROM THE LAST CHORD";
                    case 'London': return "LONDON RECOMMENDATIONS FROM THE LAST CHORD";
                    case 'Articles': return "NEW FROM THE LAST CHORD";
                    case 'New In Tech': return "TECHNOLOGY NEWS FROM OTHER OUTLETS";
                    default: return "";
                }
            };

            const toggleFavorite = (item, originTab) => {
                const title = item.title || item.name || "Untitled";
                const compositeKey = `${originTab}-${title}`;
                
                setFavorites(prev => {
                    const exists = prev.some(f => f.compositeKey === compositeKey);
                    if (exists) {
                        return prev.filter(f => f.compositeKey !== compositeKey);
                    } else {
                        return [...prev, { compositeKey, originTab, data: item }];
                    }
                });
            };

            const isItemSaved = (itemTitle, originTab) => {
                return favorites.some(f => f.compositeKey === `${originTab}-${itemTitle}`);
            };

            const filteredStandardItems = useMemo(() => {
                const currentTabKey = activeTab === 'New In Tech' ? 'Tech' : activeTab;
                let items = data[currentTabKey] || [];

                if (activeTab === 'Articles' && selectedCategory !== 'Landing' && selectedCategory !== 'All') {
                    items = items.filter(item => (item.summary || "").trim() === selectedCategory);
                }
                
                if (activeTab === 'Articles' && selectedCategory === 'All' && sortOrder === 'oldest') {
                    items = items.slice().reverse();
                }

                if (!searchQuery.trim()) return items;
                const query = searchQuery.toLowerCase().trim();
                return items.filter(item => {
                    const title = (item.title || item.name || "").toLowerCase();
                    const sub = (item.artist || item.summary || item.category || "").toLowerCase();
                    const bodyText = (item.description || item.review || "").toLowerCase();
                    return title.includes(query) || sub.includes(query) || bodyText.includes(query);
                });
            }, [data, activeTab, searchQuery, selectedCategory, sortOrder]);

            const filteredCollectionItems = useMemo(() => {
                let items = favorites;
                
                if (collectionSubFilter !== 'All') {
                    const targetOrigin = collectionSubFilter === 'News in Tech' ? 'New In Tech' : collectionSubFilter;
                    items = items.filter(f => f.originTab === targetOrigin);
                }

                if (!searchQuery.trim()) return items;
                const query = searchQuery.toLowerCase().trim();
                return items.filter(f => {
                    const title = (f.data.title || f.data.name || "").toLowerCase();
                    const sub = (f.data.artist || f.data.summary || f.data.category || "").toLowerCase();
                    const bodyText = (f.data.description || f.data.review || "").toLowerCase();
                    return title.includes(query) || sub.includes(query) || bodyText.includes(query);
                });
            }, [favorites, collectionSubFilter, searchQuery]);

            const renderCard = (item, originTab, index) => {
                const title = item.title || item.name || "Untitled";
                let sub = item.summary || item.artist || item.category || "";
                const img = item.image || "";
                const finalLink = item.link || item.spotify || item.url;
                const bodyText = item.description || item.review || "";
                const album = item.album || "";
                const year = item.year || "";
                const location = item.location || "";
                
                const saved = isItemSaved(title, originTab);

                return (
                    <div key={`${title}-${index}`} className={`group relative overflow-hidden h-[550px] ${theme.cardBg} animate-fade-in`}>
                        <div className="absolute inset-0 z-10">
                            {img ? (
                                <img src={img} className="w-full h-full object-cover grayscale opacity-90 transition-transform duration-700 group-hover:scale-110" />
                            ) : (
                                <div className={`w-full h-full ${theme.placeholderBg} flex items-center justify-center text-[10px] uppercase tracking-widest opacity-20`}>No Image Provided</div>
                            )}
                        </div>
                        
                        <div className={`absolute bottom-0 left-0 w-full p-8 bg-gradient-to-t ${darkMode ? 'from-[#1C1C1E] via-[#1C1C1E]/80' : 'from-white via-white/80'} to-transparent z-20 group-hover:opacity-0 transition-opacity duration-300`}>
                            <h3 className={`font-serif text-2xl italic leading-tight ${darkMode ? 'text-[#F5EFE6]' : 'text-[#001F3F]'}`}>{title}</h3>
                            <p className={`text-[10px] uppercase tracking-[0.3em] font-bold opacity-50 ${darkMode ? 'text-[#F5EFE6]' : 'text-[#001F3F]'}`}>{sub}</p>
                        </div>
                        
                        <div className={`absolute inset-0 ${darkMode ? 'bg-[#F5EFE6] text-[#121212]' : 'bg-[#001F3F] text-[#E6F0FA]'} opacity-0 group-hover:opacity-100 transition-all duration-500 z-40 flex flex-col p-10`}>
                            <div className="flex justify-between items-start">
                                <div>
                                    <h3 className="font-serif text-3xl italic mb-2">{title}</h3>
                                    <p className={`text-[10px] uppercase tracking-widest font-bold opacity-50 mb-6 border-b ${darkMode ? 'border-[#121212]/20' : 'border-[#E6F0FA]/20'} pb-4`}>{sub}</p>
                                </div>
                                <span className="text-[7px] uppercase tracking-widest border border-current px-2 py-0.5 rounded opacity-40">{originTab}</span>
                            </div>
                            
                            <div className="mb-6 space-y-1 text-[9px] uppercase tracking-[0.2em] opacity-60 italic font-light">
                                {album && <p>Album: {album}</p>}
                                {year && <p>Released: {year}</p>}
                                {location && <p>Location: {location}</p>}
                            </div>
                            
                            <div className="flex-grow overflow-y-auto custom-scroll mb-8 pr-2">
                                <p className="text-xs font-light leading-relaxed italic opacity-90">{bodyText ? `"${bodyText}"` : "Editorial pending."}</p>
                            </div>
                            
                            <div className="mt-auto flex flex-col space-y-2">
                                {finalLink && (
                                    <a href={finalLink} target="_blank" className={`border ${darkMode ? 'border-[#121212]' : 'border-[#E6F0FA]'} hover:bg-transparent ${darkMode ? 'hover:text-[#121212] bg-[#121212] text-[#F5EFE6]' : 'hover:text-[#001F3F] bg-[#001F3F] text-[#E6F0FA]'} py-4 text-[9px] uppercase tracking-[0.4em] font-bold text-center transition-all`}>
                                        {originTab === 'Songs' ? "Listen on Spotify" : originTab === 'Articles' ? "Read Publication" : "Website"}
                                    </a>
                                )}
                                
                                <button 
                                    onClick={() => toggleFavorite(item, originTab)}
                                    className={`border ${darkMode ? 'border-[#121212]/30 hover:bg-[#121212] hover:text-[#F5EFE6]' : 'border-[#E6F0FA]/30 hover:bg-[#E6F0FA] hover:text-[#001F3F]'} py-2 text-[8px] uppercase tracking-[0.3em] font-bold text-center transition-all`}
                                >
                                    {saved ? "✕ Remove from Collection" : "✓ Save to Collection"}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderContent = () => {
                if (viewingCollection) {
                    return (
                        <div className="flex flex-col w-full">
                            <div className="w-full px-4 md:px-8 max-w-xl mx-auto mb-8 mt-2 flex flex-col items-center space-y-6 animate-fade-in">
                                <div className="text-center">
                                    <h2 className="font-serif text-4xl italic tracking-tight mb-2">My Collection</h2>
                                    <p className="text-[10px] uppercase tracking-[0.3em] opacity-50">Centralised Vault</p>
                                </div>

                                <div className="flex flex-col items-center space-y-2 w-full max-w-xs">
                                    <label className="text-[8px] uppercase tracking-[0.3em] opacity-40 font-bold">Sort Vault Category</label>
                                    <select 
                                        value={collectionSubFilter}
                                        onChange={(e) => setCollectionSubFilter(e.target.value)}
                                        className={`w-full bg-transparent border ${darkMode ? 'border-[#F5EFE6]/30 text-[#F5EFE6] bg-[#1C1C1E]' : 'border-[#001F3F]/20 text-[#001F3F] bg-white'} px-4 py-3 text-[10px] uppercase tracking-widest outline-none rounded-none cursor-pointer font-bold`}
                                    >
                                        <option value="All">All Saved Items</option>
                                        <option value="Songs">Songs</option>
                                        <option value="Articles">Articles</option>
                                        <option value="London">London</option>
                                        <option value="News in Tech">News in Tech</option>
                                    </select>
                                </div>

                                <input 
                                    type="text"
                                    placeholder="Search..."
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                    className={`w-full max-w-xs bg-transparent border-b ${darkMode ? 'border-[#F5EFE6]/30 focus:border-[#F5EFE6]' : 'border-[#001F3F]/20 focus:border-[#001F3F]'} py-2 text-xs uppercase tracking-widest outline-none text-center transition-colors font-light placeholder:opacity-40`}
                                />
                            </div>

                            {filteredCollectionItems.length === 0 ? (
                                <div className="flex flex-col items-center justify-center py-40 px-6 text-center animate-fade-in opacity-40">
                                    <p className="font-serif text-xl italic mb-2">Vault Empty.</p>
                                    <p className="text-[10px] uppercase tracking-widest font-light">No records saved here.</p>
                                </div>
                            ) : (
                                <div className={`grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 grid-layout ${theme.layoutGrid} p-0.5 pb-80`}>
                                    {filteredCollectionItems.map((f, i) => renderCard(f.data, f.originTab, i))}
                                </div>
                            )}
                        </div>
                    );
                }

                // HIGH-END EDITORIAL HOME & ABOUT ME COMBINED INTERFACE
                if (activeTab === 'Home') return (
                    <div className="w-full px-4 md:px-12 max-w-5xl mx-auto py-12 pb-44 animate-fade-in space-y-24">
                        
                        {/* HERO HEADER REGION */}
                        <div className="text-center py-6">
                             <h1 className="text-6xl md:text-8xl font-serif italic tracking-tighter leading-none">The Last Chord</h1>
                             <p className="text-[10px] uppercase tracking-[0.6em] font-bold opacity-40 mt-6 leading-loose">BY TRISHA RAI | EST. 2025</p>
                             <p className="text-sm italic opacity-70 max-w-md mx-auto mt-6 font-light leading-relaxed">
                                 A curated compendium investigating sonic landmarks, urban architecture, and creative blueprints.
                             </p>
                        </div>

                        {/* SPLIT LAYOUT PROFILE AND BIO ROW (ABOUT ME) */}
                        <div className={`grid grid-cols-1 md:grid-cols-12 gap-8 items-center border-t border-b ${theme.border} py-12`}>
                            <div className="md:col-span-4 flex justify-center">
                                <div className="w-56 h-56 md:w-64 md:h-64 rounded-full overflow-hidden grayscale border-4 border-current p-1 opacity-90 shadow-xl">
                                    <img 
                                        src="https://trishrai.github.io/thelastchord/Logo.jpeg" 
                                        alt="Trisha Rai Profile" 
                                        className="w-full h-full object-cover rounded-full"
                                    />
                                </div>
                            </div>
                            
                            <div className="md:col-span-8 space-y-4">
                                <span className="text-[9px] uppercase tracking-[0.3em] font-bold opacity-40 block">Behind the Desk</span>
                                <h2 className="font-serif text-3xl italic tracking-tight">About Me & The Project</h2>
                                <p className="text-xs font-light leading-relaxed opacity-80 text-justify">
                                    Welcome to my corner of the internet. I'm Trisha Rai, a writer and curator focused on tracking cultural architecture, breakthrough art, and original long-form music analysis. <strong>The Last Chord</strong> is designed to cut directly past simple algorithm streams, providing a permanent home for curated records that truly matter.
                                </p>
                                <p className="text-xs font-light leading-relaxed opacity-80 text-justify">
                                    Whether mapping historical sound movements under our editorial segments, showcasing hyper-local independent cultural corners in London, or dissecting shifting frameworks inside tech news outlets, this site serves as an interactive blueprint of my ongoing creative writing and visual research.
                                </p>
                            </div>
                        </div>

                        {/* NAVIGATIONAL MANIFESTO HIGHROAD CARD BLOCKS */}
                        <div className="space-y-6">
                            <div className="text-center">
                                <h3 className="font-serif text-xl italic tracking-tight mb-1">Explore the Verticals</h3>
                                <p className="text-[9px] uppercase tracking-widest opacity-40">Direct routing into the site's database pipelines</p>
                            </div>
                            
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 text-center">
                                {[
                                    { id: 'Songs', desc: 'Audio Curation' },
                                    { id: 'London', desc: 'City Guide' },
                                    { id: 'Articles', desc: 'Longform Essays' },
                                    { id: 'New In Tech', desc: 'External Tech Outlets' }
                                ].map(pillar => (
                                    <div 
                                        key={pillar.id}
                                        onClick={() => setActiveTab(pillar.id)}
                                        className={`border ${darkMode ? 'border-[#F5EFE6]/10 hover:bg-[#F5EFE6] hover:text-[#121212]' : 'border-[#001F3F]/10 hover:bg-[#001F3F] hover:text-[#E6F0FA]'} p-6 cursor-pointer transition-all duration-300 flex flex-col justify-center h-24`}
                                    >
                                        <h4 className="font-serif text-base italic leading-none mb-1">{pillar.id}</h4>
                                        <span className="text-[8px] uppercase tracking-widest opacity-40 font-bold">{pillar.desc}</span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* ACTION CALL HOOK */}
                        <div className="flex flex-col items-center pt-4 space-y-6">
                            <div className="group relative w-full max-w-xs">
                                <a href="https://thelastchord.substack.com" target="_blank" className={`block text-center border ${darkMode ? 'border-[#F5EFE6]' : 'border-[#001F3F]'} w-full py-5 ${darkMode ? 'hover:bg-[#F5EFE6] hover:text-[#121212]' : 'hover:bg-[#001F3F] hover:text-[#D1E2F2]'} transition-all uppercase tracking-[0.4em] text-[10px] font-bold relative z-10`}>Read On Substack</a>
                                <div className={`absolute top-2 left-2 w-full h-full border ${darkMode ? 'border-[#F5EFE6]/10' : 'border-[#001F3F]/10'} -z-0`}></div>
                            </div>
                            
                            <button 
                                onClick={() => { setViewingCollection(true); setCollectionSubFilter('All'); }}
                                className="text-[10px] uppercase tracking-[0.3em] font-bold opacity-50 hover:opacity-100 transition-opacity flex items-center space-x-2"
                            >
                                <span>Open Vault Collection ({favorites.length})</span>
                            </button>
                        </div>
                    </div>
                );

                if (activeTab === 'Articles' && selectedCategory === 'Landing') {
                    return (
                        <div className="w-full px-4 md:px-8 max-w-5xl mx-auto py-6 animate-fade-in flex flex-col items-center">
                            
                            <div className="text-center mb-8">
                                <h2 className="font-serif text-4xl italic tracking-tight mb-2">Editorial Registry</h2>
                                <p className="text-[10px] uppercase tracking-[0.3em] opacity-50">Select an archive sector to browse recommendations</p>
                            </div>

                            <div className="w-full max-w-md mb-10 flex flex-col items-center">
                                <input 
                                    type="text"
                                    placeholder="Search..."
                                    value={searchQuery}
                                    onChange={(e) => {
                                        setSearchQuery(e.target.value);
                                        if(e.target.value.trim() !== '') {
                                            setSelectedCategory('All'); 
                                        }
                                    }}
                                    className={`w-full bg-transparent border-b ${darkMode ? 'border-[#F5EFE6]/30 focus:border-[#F5EFE6]' : 'border-[#001F3F]/20 focus:border-[#001F3F]'} py-3 text-sm uppercase tracking-widest outline-none text-center transition-colors font-light placeholder:opacity-40`}
                                />
                            </div>
                            
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 w-full mb-40">
                                {Object.keys(CATEGORY_MAP).map((key) => {
                                    const cat = CATEGORY_MAP[key];
                                    const isHovered = hoveredCategory === key;
                                    return (
                                        <div 
                                            key={key}
                                            onClick={() => setSelectedCategory(key)}
                                            onMouseEnter={() => setHoveredCategory(key)}
                                            onMouseLeave={() => setHoveredCategory(null)}
                                            className={`border ${darkMode ? 'border-[#F5EFE6]/20 hover:bg-[#F5EFE6] hover:text-[#121212]' : 'border-[#001F3F]/20 hover:bg-[#001F3F] hover:text-[#E6F0FA]'} p-8 h-56 flex flex-col justify-center items-center text-center cursor-pointer transition-all duration-300 relative group`}
                                        >
                                            {isHovered ? (
                                                <p className="text-xs italic leading-relaxed px-2 font-light tracking-wide animate-fade-in">{cat.desc}</p>
                                            ) : (
                                                <div className="flex flex-col items-center space-y-3">
                                                    <span className={`text-[9px] font-bold uppercase tracking-[0.2em] px-3 py-1 rounded-full ${cat.pillBg} ${cat.pillText}`}>
                                                        {cat.title.split(':')[0]}
                                                    </span>
                                                    <h3 className="font-serif text-xl italic tracking-tight">{cat.title.includes(':') ? cat.title.split(':')[1].trim() : cat.title}</h3>
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}

                                <div 
                                    onClick={() => setSelectedCategory('All')}
                                    className={`border border-dashed ${darkMode ? 'border-[#F5EFE6]/40 hover:bg-[#F5EFE6] hover:text-[#121212]' : 'border-[#001F3F]/30 hover:bg-[#001F3F] hover:text-[#E6F0FA]'} p-8 h-56 flex flex-col justify-center items-center text-center cursor-pointer transition-all duration-300 group`}
                                >
                                    <span className="text-lg mb-2">👁</span>
                                    <h3 className="text-xs uppercase tracking-[0.4em] font-bold">Browse All Articles</h3>
                                </div>
                            </div>
                        </div>
                    );
                }

                return (
                    <div className="flex flex-col w-full">
                        <div className="w-full px-4 md:px-8 max-w-xl mx-auto mb-8 mt-2 flex flex-col items-center space-y-4 animate-fade-in">
                            
                            <div className="flex items-center space-x-6 text-[10px] uppercase tracking-[0.2em] font-bold">
                                {activeTab === 'Articles' && (
                                    <button 
                                        onClick={() => { setSelectedCategory('Landing'); setSearchQuery(''); }}
                                        className="opacity-50 hover:opacity-100 transition-opacity flex items-center space-x-1"
                                    >
                                        <span>← Index Deck</span>
                                    </button>
                                )}
                                <span className={`pb-1 ${darkMode ? 'border-[#F5EFE6]' : 'border-[#001F3F]'}`}>
                                    {selectedCategory === 'All' ? 'All Pieces' : selectedCategory !== 'Landing' && activeTab === 'Articles' ? selectedCategory.split(':')[0] : `${activeTab} Channel`}
                                </span>
                            </div>

                            {activeTab === 'Articles' && selectedCategory === 'All' && (
                                <div className="flex items-center space-x-4 text-[9px] uppercase tracking-[0.15em] opacity-60">
                                    <button onClick={() => setSortOrder('newest')} className={`transition-all ${sortOrder === 'newest' ? 'font-bold underline opacity-100' : 'hover:opacity-100'}`}>Newest First</button>
                                    <span>|</span>
                                    <button onClick={() => setSortOrder('oldest')} className={`transition-all ${sortOrder === 'oldest' ? 'font-bold underline opacity-100' : 'hover:opacity-100'}`}>Oldest First</button>
                                </div>
                            )}

                            <input 
                                type="text"
                                placeholder="Search..."
                                value={searchQuery}
                                onChange={(e) => setSearchQuery(e.target.value)}
                                className={`w-full max-w-xs bg-transparent border-b ${darkMode ? 'border-[#F5EFE6]/30 focus:border-[#F5EFE6]' : 'border-[#001F3F]/20 focus:border-[#001F3F]'} py-2 text-xs uppercase tracking-widest outline-none text-center transition-colors font-light placeholder:opacity-40`}
                            />
                        </div>

                        {filteredStandardItems.length === 0 ? (
                            <div className="flex flex-col items-center justify-center py-40 px-6 text-center animate-fade-in opacity-40">
                                <p className="font-serif text-xl italic mb-2">No elements found.</p>
                                <p className="text-[10px] uppercase tracking-widest font-light leading-relaxed">Adjust your filter or search criteria.</p>
                            </div>
                        ) : (
                            <div className={`grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 grid-layout ${theme.layoutGrid} p-0.5 pb-80`}>
                                {filteredStandardItems.map((item, i) => renderCard(item, activeTab, i))}
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div className={`min-h-screen flex flex-col ${theme.bg} ${theme.text}`}>
                    <nav className={`fixed top-0 w-full ${theme.navBg} backdrop-blur-md z-50 px-8 py-4 flex justify-between items-center border-b ${theme.border}`}>
                        <div className="flex items-center space-x-4">
                            <button onClick={() => { setActiveTab('Home'); setViewingCollection(false); }} className="hover:opacity-70 transition-opacity">
                                <img src="https://trishrai.github.io/thelastchord/Logo.jpeg" alt="TLC" className="h-10 w-10 md:h-12 md:w-12 rounded-full object-cover border border-[#001F3F]/20 shadow-sm" />
                            </button>
                            
                            <button 
                                onClick={() => setDarkMode(!darkMode)} 
                                className={`text-[8px] uppercase tracking-[0.3em] px-3 py-1 border ${darkMode ? 'border-[#F5EFE6]/30 text-[#F5EFE6]/60 hover:text-[#F5EFE6]' : 'border-[#001F3F]/20 text-[#001F3F]/60 hover:text-[#001F3F]'} rounded transition-all`}
                            >
                                {darkMode ? "Light Mode" : "Dark Mode"}
                            </button>
                        </div>
                        
                        <div className="hidden lg:block text-center flex-grow">
                            <h2 className="text-[9px] md:text-[10px] uppercase tracking-[0.4em] font-bold opacity-70">
                                {getPageHeader(activeTab)}
                            </h2>
                        </div>
                        
                        <div className="flex items-center space-x-4">
                            <button 
                                onClick={() => { setViewingCollection(!viewingCollection); setSearchQuery(''); }}
                                className={`text-[9px] uppercase tracking-[0.2em] font-bold px-3 py-1.5 border ${viewingCollection ? (darkMode ? 'bg-[#F5EFE6] text-[#121212]' : 'bg-[#001F3F] text-[#D1E2F2]') : 'border-transparent'} transition-all rounded flex items-center space-x-1`}
                            >
                                <span>Collection ({favorites.length})</span>
                            </button>

                            <div className={`text-[9px] uppercase tracking-[0.5em] font-bold px-4 py-1.5 border ${theme.pillBorder} rounded-full hidden sm:block`}>
                                {viewingCollection ? "Vault" : activeTab}
                            </div>
                        </div>
                    </nav>

                    <main className="pt-24 flex-grow mx-auto w-full max-w-[1600px]">{renderContent()}</main>

                    <footer className={`fixed bottom-0 w-full ${theme.footerBg} backdrop-blur-md border-t ${theme.border} flex justify-around p-6 text-[9px] uppercase font-bold tracking-[0.2em] z-50 shadow-sm`}>
                        {['Home', 'Songs', 'London', 'Articles', 'New In Tech'].map(tab => (
                            <button 
                                key={tab} 
                                onClick={() => { setActiveTab(tab); setViewingCollection(false); }} 
                                className={(!viewingCollection && activeTab === tab) ? `scale-105 transition-transform border-b ${darkMode ? 'border-[#F5EFE6] text-[#F5EFE6]' : 'border-[#001F3F] text-[#001F3F]'}` : "opacity-30 hover:opacity-100 transition-all"}
                            >
                                {tab}
                            </button>
                        ))}
                    </footer>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
