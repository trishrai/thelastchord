<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Last Chord</title>
    
    <link rel="apple-touch-icon" href="https://trishrai.github.io/thelastchord/Logo.jpeg">
    <link rel="icon" type="image/jpeg" href="https://trishrai.github.io/thelastchord/Logo.jpeg">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="The Last Chord">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; transition: background-color 0.4s ease, color 0.4s ease; }
        .font-serif { font-family: 'Libre Baskerville', serif; }
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(0, 31, 63, 0.2); border-radius: 10px; }
        .grid-layout { gap: 1px !important; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeInUp 0.5s ease-out forwards; }
        .home-container { padding-bottom: 5rem; }
        @media (min-height: 800px) { .home-container { min-height: calc(100vh - 100px); display: flex; flex-direction: column; justify-content: center; } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState(() => {
                return localStorage.getItem('tlc_active_tab') || 'Home';
            });
            
            const [darkMode, setDarkMode] = useState(() => {
                return localStorage.getItem('tlc_dark_mode') === 'true';
            });

            const [favorites, setFavorites] = useState(() => {
                const cachedData = localStorage.getItem('tlc_favorites_v2');
                return cachedData ? JSON.parse(cachedData) : [];
            });

            const [searchQuery, setSearchQuery] = useState('');
            const [viewingCollection, setViewingCollection] = useState(false);
            const [collectionSubFilter, setCollectionSubFilter] = useState('All');
            const [selectedCategory, setSelectedCategory] = useState('Landing'); 
            const [sortOrder, setSortOrder] = useState('newest'); 
            const [hoveredCategory, setHoveredCategory] = useState(null); 
            const [data, setData] = useState({ Songs: [], London: [], Articles: [], Tech: [] });

            // Registration states (expanded for city dropdown)
            const [formData, setFormData] = useState({ firstName: '', lastName: '', email: '', city: '' });
            const [signupStatus, setSignupStatus] = useState('idle');
            const [showCustomCity, setShowCustomCity] = useState(false);
            const [customCityValue, setCustomCityValue] = useState('');
            const [showAboutPanel, setShowAboutPanel] = useState(false);

            const NEWSLETTER_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzSZ6k73EZK0T7xuCalKSFQ61ztl3LYBdAcxr_ZtYSDoFTAFaHAVrJygjvG1-K1SRqZ3w/exec";

            const CSV_LINKS = {
                Songs: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSyk-CW-uRScOp42schBcPTBMBIfu8RtGJtDlNkmn2fHnvqoI5GiXKEYiYv62nzVk6aemxQp7cdCamh/pub?gid=0&single=true&output=csv",
                London: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSyk-CW-uRScOp42schBcPTBMBIfu8RtGJtDlNkmn2fHnvqoI5GiXKEYiYv62nzVk6aemxQp7cdCamh/pub?gid=1791301794&single=true&output=csv",
                Articles: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSyk-CW-uRScOp42schBcPTBMBIfu8RtGJtDlNkmn2fHnvqoI5GiXKEYiYv62nzVk6aemxQp7cdCamh/pub?gid=116420010&single=true&output=csv",
                Tech: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSyk-CW-uRScOp42schBcPTBMBIfu8RtGJtDlNkmn2fHnvqoI5GiXKEYiYv62nzVk6aemxQp7cdCamh/pub?gid=1956240315&single=true&output=csv"
            };

            const CATEGORY_MAP = {
                "The Last Chord": {
                    title: "The Last Chord",
                    pillBg: "bg-[#DDEBFA]", pillText: "text-[#1E40AF]",
                    desc: "Welcome to The Last Chord. Read about us here."
                },
                "Off The Record: Opinion Pieces": {
                    title: "Off The Record: Opinion Pieces",
                    pillBg: "bg-[#E2F0D9]", pillText: "text-[#2E7D32]",
                    desc: "Welcome to Off the Record, where art meets insight. We offer sharp, unfiltered opinion pieces on cultural shifts, the evolution of sound, and the timeless debates shaping the industry."
                },
                "The Sonic Lens: Analysis": {
                    title: "The Sonic Lens: Analysis",
                    pillBg: "bg-[#F3E5F5]", pillText: "text-[#6A1B9A]",
                    desc: "Welcome to The Sonic Lens. We examine the intersection of art, culture, and society through a critical eye. From the evolution of musical traditions to the impact of iconic movements, we offer thought-provoking analysis on how art shapes our world."
                },
                "Studio Sessions: Interviews": {
                    title: "Studio Sessions: Interviews",
                    pillBg: "bg-[#E0F2F1]", pillText: "text-[#00695C]",
                    desc: "Welcome to Studio Sessions, where creativity meets conversation. We interview musicians, writers, and visual creators to uncover the stories behind their art. Dive deep into the processes, struggles, and passions that drive the creative world."
                },
                "Soundcheck: Reviews": {
                    title: "Soundcheck: Reviews",
                    pillBg: "bg-[#FCE4EC]", pillText: "text-[#C2185B]",
                    desc: "Welcome to Soundcheck, the reviews section of The Last Chord. We cover albums, films, art, and culture that leave a mark. Beyond simple critiques, we unpack the storytelling, rebellion, and raw emotion behind every piece."
                }
            };

            useEffect(() => {
                localStorage.setItem('tlc_active_tab', activeTab);
                setSearchQuery(''); 
                if (activeTab === 'Articles') {
                    setSelectedCategory('Landing'); 
                }
            }, [activeTab]);

            useEffect(() => {
                localStorage.setItem('tlc_dark_mode', darkMode);
            }, [darkMode]);

            useEffect(() => {
                localStorage.setItem('tlc_favorites_v2', JSON.stringify(favorites));
            }, [favorites]);

            useEffect(() => {
                Object.keys(CSV_LINKS).forEach(key => {
                    Papa.parse(CSV_LINKS[key], {
                        download: true, header: true, skipEmptyLines: true,
                        complete: (results) => {
                            const cleanData = results.data.map(row => {
                                const newRow = {};
                                Object.keys(row).forEach(k => { newRow[k.toLowerCase().trim()] = row[k]; });
                                return newRow;
                            });
                            setData(prev => ({ ...prev, [key]: cleanData.reverse() }));
                        }
                    });
                });
            }, []);

            const theme = {
                bg: darkMode ? 'bg-[#121212]' : 'bg-[#D1E2F2]',
                navBg: darkMode ? 'bg-[#121212]/90' : 'bg-[#D1E2F2]/90',
                footerBg: darkMode ? 'bg-[#121212]/95' : 'bg-[#D1E2F2]/95',
                text: darkMode ? 'text-[#F5EFE6]' : 'text-[#001F3F]',
                border: darkMode ? 'border-[#F5EFE6]/10' : 'border-[#001F3F]/10',
                pillBorder: darkMode ? 'border-[#F5EFE6]' : 'border-[#001F3F]',
                cardBg: darkMode ? 'bg-[#1C1C1E]' : 'bg-white',
                layoutGrid: darkMode ? 'bg-[#F5EFE6]/10' : 'bg-[#001F3F]/10',
                placeholderBg: darkMode ? 'bg-[#F5EFE6]/5' : 'bg-[#001F3F]/5',
                formCard: darkMode ? 'bg-[#1E1E22]/90 border-white/10' : 'bg-white/90 border-[#001F3F]/10'
            };

            const getPageHeader = (tab) => {
                if (viewingCollection) return "YOUR MASTER COLLECTION DECK";
                if (tab === 'Home') return "";
                switch(tab) {
                    case 'Songs': return "SONG RECOMMENDATIONS FROM THE LAST CHORD";
                    case 'London': return "LONDON RECOMMENDATIONS FROM THE LAST CHORD";
                    case 'Articles': return "NEW FROM THE LAST CHORD";
                    case 'New In Tech': return "TECHNOLOGY NEWS FROM OTHER OUTLETS";
                    default: return "";
                }
            };

            const toggleFavorite = (item, originTab) => {
                const title = item.title || item.name || "Untitled";
                const compositeKey = `${originTab}-${title}`;
                
                setFavorites(prev => {
                    const exists = prev.some(f => f.compositeKey === compositeKey);
                    if (exists) {
                        return prev.filter(f => f.compositeKey !== compositeKey);
                    } else {
                        return [...prev, { compositeKey, originTab, data: item }];
                    }
                });
            };

            const isItemSaved = (itemTitle, originTab) => {
                return favorites.some(f => f.compositeKey === `${originTab}-${itemTitle}`);
            };

            const handleFormChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleCitySelect = (e) => {
                const val = e.target.value;
                if (val === "Other (specify)") {
                    setShowCustomCity(true);
                    setFormData(prev => ({ ...prev, city: '' }));
                } else {
                    setShowCustomCity(false);
                    setFormData(prev => ({ ...prev, city: val }));
                }
            };

            const handleCustomCityChange = (e) => {
                const val = e.target.value;
                setCustomCityValue(val);
                setFormData(prev => ({ ...prev, city: val }));
            };

            const handleSubscribe = async (e) => {
                e.preventDefault();
                if (!formData.email.trim()) return;

                setSignupStatus('loading');
                try {
                    await fetch(NEWSLETTER_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(formData)
                    });
                    
                    setSignupStatus('success');
                    setFormData({ firstName: '', lastName: '', email: '', city: '' });
                    setShowCustomCity(false);
                    setCustomCityValue('');
                    setTimeout(() => setSignupStatus('idle'), 4000);
                } catch (error) {
                    setSignupStatus('error');
                    console.error("Signup failed:", error);
                    setTimeout(() => setSignupStatus('idle'), 3000);
                }
            };

            const filteredStandardItems = useMemo(() => {
                const currentTabKey = activeTab === 'New In Tech' ? 'Tech' : activeTab;
                let items = data[currentTabKey] || [];

                const effectiveCategory = (activeTab === 'Articles' && selectedCategory === 'Landing' && searchQuery.trim() !== '') 
                    ? 'All' 
                    : selectedCategory;

                if (activeTab === 'Articles' && effectiveCategory !== 'Landing' && effectiveCategory !== 'All') {
                    items = items.filter(item => (item.summary || "").trim() === effectiveCategory);
                }
                
                if (activeTab === 'Articles' && effectiveCategory === 'All' && sortOrder === 'oldest') {
                    items = items.slice().reverse();
                }

                if (!searchQuery.trim()) return items;
                const query = searchQuery.toLowerCase().trim();
                return items.filter(item => {
                    const title = (item.title || item.name || "").toLowerCase();
                    const sub = (item.artist || item.summary || item.category || "").toLowerCase();
                    const bodyText = (item.description || item.review || "").toLowerCase();
                    return title.includes(query) || sub.includes(query) || bodyText.includes(query);
                });
            }, [data, activeTab, searchQuery, selectedCategory, sortOrder]);

            const filteredCollectionItems = useMemo(() => {
                let items = favorites;
                
                if (collectionSubFilter !== 'All') {
                    const targetOrigin = collectionSubFilter === 'News in Tech' ? 'New In Tech' : collectionSubFilter;
                    items = items.filter(f => f.originTab === targetOrigin);
                }

                if (!searchQuery.trim()) return items;
                const query = searchQuery.toLowerCase().trim();
                return items.filter(f => {
                    const title = (f.data.title || f.data.name || "").toLowerCase();
                    const sub = (f.data.artist || f.data.summary || f.data.category || "").toLowerCase();
                    const bodyText = (f.data.description || f.data.review || "").toLowerCase();
                    return title.includes(query) || sub.includes(query) || bodyText.includes(query);
                });
            }, [favorites, collectionSubFilter, searchQuery]);

            const renderCard = (item, originTab, index) => {
                const title = item.title || item.name || "Untitled";
                let sub = item.summary || item.artist || item.category || "";
                const img = item.image || "";
                const finalLink = item.link || item.spotify || item.url;
                const bodyText = item.description || item.review || "";
                const album = item.album || "";
                const year = item.year || "";
                const location = item.location || "";
                
                const saved = isItemSaved(title, originTab);

                return (
                    <div key={`${title}-${index}`} className={`group relative overflow-hidden h-[550px] ${theme.cardBg} animate-fade-in`}>
                        <div className="absolute inset-0 z-10">
                            {img ? (
                                <img src={img} className="w-full h-full object-cover grayscale opacity-90 transition-transform duration-700 group-hover:scale-110" />
                            ) : (
                                <div className={`w-full h-full ${theme.placeholderBg} flex items-center justify-center text-[10px] uppercase tracking-widest opacity-50`}>No Image Provided</div>
                            )}
                        </div>
                        
                        <div className={`absolute bottom-0 left-0 w-full p-8 bg-gradient-to-t ${darkMode ? 'from-[#1C1C1E] via-[#1C1C1E]/80' : 'from-white via-white/80'} to-transparent z-20 group-hover:opacity-0 transition-opacity duration-300`}>
                            <h3 className={`font-serif text-2xl italic leading-tight ${darkMode ? 'text-[#F5EFE6]' : 'text-[#001F3F]'}`}>{title}</h3>
                            <p className={`text-[10px] uppercase tracking-[0.3em] font-bold opacity-50 ${darkMode ? 'text-[#F5EFE6]' : 'text-[#001F3F]'}`}>{sub}</p>
                        </div>
                        
                        <div className={`absolute inset-0 ${darkMode ? 'bg-[#F5EFE6] text-[#121212]' : 'bg-[#001F3F] text-[#E6F0FA]'} opacity-0 group-hover:opacity-100 transition-all duration-500 z-40 flex flex-col p-10`}>
                            <div className="flex justify-between items-start">
                                <div>
                                    <h3 className="font-serif text-3xl italic mb-2">{title}</h3>
                                    <p className={`text-[10px] uppercase tracking-widest font-bold opacity-50 mb-6 border-b ${darkMode ? 'border-[#121212]/20' : 'border-[#E6F0FA]/20'} pb-4`}>{sub}</p>
                                </div>
                                <span className="text-[7px] uppercase tracking-widest border border-current px-2 py-0.5 rounded opacity-40">{originTab}</span>
                            </div>
                            
                            <div className="mb-6 space-y-1 text-[9px] uppercase tracking-[0.2em] opacity-60 italic font-light">
                                {album && <p>Album: {album}</p>}
                                {year && <p>Released: {year}</p>}
                                {location && <p>Location: {location}</p>}
                            </div>
                            
                            <div className="flex-grow overflow-y-auto custom-scroll mb-8 pr-2">
                                <p className="text-xs font-light leading-relaxed italic opacity-90">{bodyText ? `"${bodyText}"` : " "}</p>
                            </div>
                            
                            <div className="mt-auto flex flex-col space-y-2">
                                {finalLink && (
                                    <a href={finalLink} target="_blank" className={`border ${darkMode ? 'border-[#121212]' : 'border-[#E6F0FA]'} hover:bg-transparent ${darkMode ? 'hover:text-[#121212] bg-[#121212] text-[#F5EFE6]' : 'hover:text-[#001F3F] bg-[#001F3F] text-[#E6F0FA]'} py-4 text-[9px] uppercase tracking-[0.4em] font-bold text-center transition-all`}>
                                        {originTab === 'Songs' ? "Listen on Spotify" : originTab === 'Articles' ? "Read Publication" : "Website"}
                                    </a>
                                )}
                                
                                <button 
                                    onClick={() => toggleFavorite(item, originTab)}
                                    className={`border ${darkMode ? 'border-[#121212]/30 hover:bg-[#121212] hover:text-[#F5EFE6]' : 'border-[#E6F0FA]/30 hover:bg-[#E6F0FA] hover:text-[#001F3F]'} py-2 text-[8px] uppercase tracking-[0.3em] font-bold text-center transition-all`}
                                >
                                    {saved ? "✕ Remove from Collection" : "✓ Save to Collection"}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderHome = () => (
                <div className="home-container w-full max-w-4xl mx-auto px-4 py-6">
                    <div className="text-center mb-5">
                        <h1 className="font-serif text-6xl md:text-7xl italic tracking-tighter">The Last Chord</h1>
                        <p className="text-[11px] uppercase tracking-[0.5em] font-bold opacity-40 mt-2">BY TRISHA RAI | EST. 2025</p>
                    </div>
                    <div className="flex justify-center mb-5">
                        <a href="https://thelastchord.substack.com" target="_blank" className={`text-[11px] uppercase tracking-[0.4em] font-bold border px-6 py-2 ${darkMode ? 'border-[#F5EFE6]/50 hover:border-[#F5EFE6]' : 'border-[#001F3F]/40 hover:border-[#001F3F]'}`}>READ ON SUBSTACK →</a>
                    </div>
                    <div className="flex justify-center mb-3">
                        <div className="relative cursor-pointer group" onClick={() => setShowAboutPanel(!showAboutPanel)}>
                            <img src="https://trishrai.github.io/thelastchord/Logo.jpeg" className="w-36 h-36 md:w-44 md:h-44 rounded-full object-cover shadow-xl border-2 border-white/30 group-hover:scale-105 transition-transform"/>
                            <div className="absolute inset-0 rounded-full bg-black/0 group-hover:bg-black/20 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all"><span className="text-white text-[10px] font-bold bg-black/60 px-2 py-1 rounded-full">click to read</span></div>
                        </div>
                    </div>
                    <p className="text-center text-[10px] uppercase tracking-[0.3em] opacity-50 mb-4 cursor-pointer hover:opacity-80" onClick={() => setShowAboutPanel(!showAboutPanel)}>↑ CLICK TO LEARN ABOUT THE LAST CHORD</p>
                    
                    {showAboutPanel && (
                        <div className={`max-w-2xl mx-auto mb-6 p-5 rounded-xl border ${darkMode ? 'bg-[#1C1C1E]/95 border-[#F5EFE6]/20' : 'bg-white/95 border-[#001F3F]/10'} animate-fade-in`}>
                            <div className="flex justify-between items-start mb-2"><h2 className="font-serif text-2xl italic">About The Last Chord</h2><button onClick={() => setShowAboutPanel(false)} className="text-[9px] uppercase opacity-50 hover:opacity-100">✕ close</button></div>
                            <div className="space-y-2 text-sm leading-relaxed">
                                <p>Founded by Trisha Rai, The Last Chord is a platform dedicated to exploring the intersection between technology, culture, and our daily lives. Rai was born in India and raised in Hong Kong before moving to London in 2020 to pursue her undergraduate studies at the London School of Economics and Political Science. It was during this time that Rai became captivated by the profound ways technology shapes everyday experiences.</p>
                                <p>Driven by a desire to bridge the gap between complex digital shifts and human-centric storytelling, Rai founded The Last Chord in 2025. Whether dissecting the latest pop culture phenomena or analysing the implications of emerging AI policies, every piece on the site is researched, developed, edited, and written by Rai.</p>
                                <p>Currently, Rai is pursuing a Master’s in Digital Humanities at University College London, where her research focuses on the evolving relationship between technology, culture, and artificial intelligence. Rai continues to run, edit, and write for The Last Chord full-time, building a space for thoughtful discussion and debate on the things that matter most.</p>
                                <div className="pt-2 border-t border-dashed opacity-80 text-[8px] uppercase tracking-wider font-mono">⚡ This entire web app, from interface to logic, has been personally coded, built, and developed by Trisha Rai.</div>
                            </div>
                        </div>
                    )}
                    
                    <div className={`max-w-md mx-auto w-full p-5 rounded-xl shadow-md border ${theme.formCard}`}>
                        <h3 className="font-serif text-2xl italic text-center mb-1">Subscribe To The Last Chord</h3>
                        <p className="text-[9px] uppercase text-center opacity-60 mb-4">Join The Last Chord's Newsletter</p>
                        <form onSubmit={handleSubscribe} className="flex flex-col space-y-4">
                            {signupStatus !== 'success' ? (
                                <>
                                    <div className="grid grid-cols-2 gap-3">
                                        <input type="text" name="firstName" placeholder="FIRST NAME" disabled={signupStatus === 'loading'} value={formData.firstName} onChange={handleFormChange} className={`w-full bg-transparent border-b py-2 text-[11px] uppercase outline-none ${darkMode ? 'border-[#F5EFE6]/40 focus:border-[#F5EFE6]' : 'border-[#001F3F]/30 focus:border-[#001F3F]'}`} required />
                                        <input type="text" name="lastName" placeholder="LAST NAME" disabled={signupStatus === 'loading'} value={formData.lastName} onChange={handleFormChange} className={`w-full bg-transparent border-b py-2 text-[11px] uppercase outline-none ${darkMode ? 'border-[#F5EFE6]/40 focus:border-[#F5EFE6]' : 'border-[#001F3F]/30 focus:border-[#001F3F]'}`} />
                                    </div>
                                    <div>
                                        <select onChange={handleCitySelect} value={showCustomCity ? "Other (specify)" : formData.city} className={`w-full bg-transparent border-b py-2 text-[11px] uppercase outline-none ${darkMode ? 'border-[#F5EFE6]/40 focus:border-[#F5EFE6]' : 'border-[#001F3F]/30 focus:border-[#001F3F]'}`}>
                                            <option value="">Select City</option>
                                            <option value="London">London</option>
                                            <option value="Manchester">Manchester</option>
                                            <option value="New York">New York</option>
                                            <option value="Los Angeles">Los Angeles</option>
                                            <option value="Tokyo">Tokyo</option>
                                            <option value="Hong Kong">Hong Kong</option>
                                            <option value="Singapore">Singapore</option>
                                            <option value="Mumbai">Mumbai</option>
                                            <option value="Delhi">Delhi</option>
                                            <option value="Berlin">Berlin</option>
                                            <option value="Paris">Paris</option>
                                            <option value="Toronto">Toronto</option>
                                            <option value="Sydney">Sydney</option>
                                            <option value="Dubai">Dubai</option>
                                            <option value="San Francisco">San Francisco</option>
                                            <option value="Austin">Austin</option>
                                            <option value="Chicago">Chicago</option>
                                            <option value="Other (specify)">Other (specify)</option>
                                        </select>
                                        {showCustomCity && <input type="text" placeholder="Type your city" value={customCityValue} onChange={handleCustomCityChange} className={`mt-2 w-full bg-transparent border-b py-2 text-[11px] uppercase outline-none ${darkMode ? 'border-[#F5EFE6]/40 focus:border-[#F5EFE6]' : 'border-[#001F3F]/30 focus:border-[#001F3F]'}`} />}
                                    </div>
                                    <div><input type="email" name="email" required placeholder="EMAIL ADDRESS" disabled={signupStatus === 'loading'} value={formData.email} onChange={handleFormChange} className={`w-full bg-transparent border-b py-2 text-[11px] uppercase outline-none ${darkMode ? 'border-[#F5EFE6]/40 focus:border-[#F5EFE6]' : 'border-[#001F3F]/30 focus:border-[#001F3F]'}`} /></div>
                                    <button type="submit" disabled={signupStatus === 'loading'} className={`text-[10px] uppercase tracking-[0.4em] font-bold py-2.5 border ${darkMode ? 'border-[#F5EFE6] hover:bg-[#F5EFE6] hover:text-[#121212]' : 'border-[#001F3F] hover:bg-[#001F3F] hover:text-white'}`}>{signupStatus === 'loading' ? 'LOADING...' : 'SUBSCRIBE →'}</button>
                                </>
                            ) : (
                                <div className="text-center py-2">
                                    <p className="text-[10px] uppercase text-emerald-600 dark:text-emerald-400 font-bold">✓ SUBSCRIBED</p>
                                    <p className="text-[8px] uppercase opacity-60 mt-1">You're on the list. Welcome to The Last Chord.</p>
                                </div>
                            )}
                            {signupStatus === 'error' && <p className="text-[8px] text-rose-500 text-center">X Failed. Try again.</p>}
                        </form>
                    </div>
                </div>
            );

            const renderContent = () => {
                if (viewingCollection) {
                    return (
                        <div className="flex flex-col w-full">
                            <div className="w-full px-4 md:px-8 max-w-xl mx-auto mb-8 mt-2 flex flex-col items-center space-y-6 animate-fade-in">
                                <div className="text-center">
                                    <h2 className="font-serif text-4xl italic tracking-tight mb-2">My Collection</h2>
                                    <p className="text-[10px] uppercase tracking-[0.3em] opacity-50">Centralised Vault</p>
                                </div>

                                <div className="flex flex-col items-center space-y-2 w-full max-w-xs">
                                    <label className="text-[8px] uppercase tracking-[0.3em] opacity-40 font-bold">Sort Vault Category</label>
                                    <select 
                                        value={collectionSubFilter}
                                        onChange={(e) => setCollectionSubFilter(e.target.value)}
                                        className={`w-full bg-transparent border ${darkMode ? 'border-[#F5EFE6]/30 text-[#F5EFE6] bg-[#1C1C1E]' : 'border-[#001F3F]/20 text-[#001F3F] bg-white'} px-4 py-3 text-[10px] uppercase tracking-widest outline-none rounded-none cursor-pointer font-bold`}
                                    >
                                        <option value="All">All Saved Items</option>
                                        <option value="Songs">Songs</option>
                                        <option value="Articles">Articles</option>
                                        <option value="London">London</option>
                                        <option value="News in Tech">News in Tech</option>
                                    </select>
                                </div>

                                <input 
                                    type="text"
                                    placeholder="Search..."
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                    className={`w-full max-w-xs bg-transparent border-b ${darkMode ? 'border-[#F5EFE6]/30 focus:border-[#F5EFE6]' : 'border-[#001F3F]/20 focus:border-[#001F3F]'} py-2 text-xs uppercase tracking-widest outline-none text-center transition-colors font-light placeholder:opacity-40`}
                                />
                            </div>

                            {filteredCollectionItems.length === 0 ? (
                                <div className="text-center py-20 opacity-40 text-xs uppercase tracking-widest animate-fade-in">No Records Found! Start Saving To Your Collection</div>
                            ) : (
                                <div className={`grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 grid-layout ${theme.layoutGrid}`}>
                                    {filteredCollectionItems.map((f, idx) => renderCard(f.data, f.originTab, idx))}
                                </div>
                            )}
                        </div>
                    );
                }

                if (activeTab === 'Home') return renderHome();

                return (
                    <div className="flex flex-col w-full">
                        <div className="w-full px-4 md:px-8 max-w-xl mx-auto mb-8 mt-2 flex flex-col items-center space-y-5 animate-fade-in">
                            <input 
                                type="text"
                                placeholder={`Search ${activeTab}...`}
                                value={searchQuery}
                                onChange={(e) => setSearchQuery(e.target.value)}
                                className={`w-full max-w-xs bg-transparent border-b ${darkMode ? 'border-[#F5EFE6]/30 focus:border-[#F5EFE6]' : 'border-[#001F3F]/20 focus:border-[#001F3F]'} py-2 text-xs uppercase tracking-widest outline-none text-center transition-colors font-light placeholder:opacity-40`}
                            />
                            
                            {activeTab === 'Articles' && searchQuery.trim() === '' && (
                                <div className="flex flex-col items-center space-y-2 w-full max-w-xs">
                                    <label className="text-[8px] uppercase tracking-[0.3em] opacity-40 font-bold">Filter By Collection</label>
                                    <select 
                                        value={selectedCategory}
                                        onChange={(e) => setSelectedCategory(e.target.value)}
                                        className={`w-full bg-transparent border ${darkMode ? 'border-[#F5EFE6]/30 text-[#F5EFE6] bg-[#1C1C1E]' : 'border-[#001F3F]/20 text-[#001F3F] bg-white'} px-4 py-3 text-[10px] uppercase tracking-widest outline-none rounded-none cursor-pointer font-bold`}
                                    >
                                        <option value="Landing">Index Display</option>
                                        <option value="All">All Articles (Chronological)</option>
                                        <option value="Off The Record: Opinion Pieces">Off The Record: Opinions</option>
                                        <option value="The Sonic Lens: Analysis">The Sonic Lens: Analysis</option>
                                        <option value="Studio Sessions: Interviews">Studio Sessions: Interviews</option>
                                        <option value="Soundcheck: Reviews">Soundcheck: Reviews</option>
                                    </select>
                                </div>
                            )}

                            {activeTab === 'Articles' && selectedCategory === 'All' && searchQuery.trim() === '' && (
                                <div className="flex items-center space-x-4 text-[9px] uppercase tracking-widest opacity-60">
                                    <button onClick={() => setSortOrder('newest')} className={`font-bold ${sortOrder === 'newest' ? 'underline' : 'opacity-50'}`}>Newest</button>
                                    <span>|</span>
                                    <button onClick={() => setSortOrder('oldest')} className={`font-bold ${sortOrder === 'oldest' ? 'underline' : 'opacity-50'}`}>Oldest</button>
                                </div>
                            )}
                        </div>

                        {activeTab === 'Articles' && selectedCategory === 'Landing' && searchQuery.trim() === '' ? (
                            <div className={`grid grid-cols-1 md:grid-cols-2 grid-layout ${theme.layoutGrid} border-t ${theme.border}`}>
                                {Object.keys(CATEGORY_MAP).map((catKey) => {
                                    const cat = CATEGORY_MAP[catKey];
                                    const isHovered = hoveredCategory === catKey;
                                    return (
                                        <div 
                                            key={catKey}
                                            onClick={() => setSelectedCategory(catKey)}
                                            onMouseEnter={() => setHoveredCategory(catKey)}
                                            onMouseLeave={() => setHoveredCategory(null)}
                                            className={`relative h-[400px] ${theme.cardBg} flex flex-col justify-between p-10 cursor-pointer overflow-hidden transition-all duration-500 animate-fade-in group`}
                                        >
                                            <div className="absolute inset-0 bg-current opacity-0 group-hover:opacity-[0.02] transition-opacity pointer-events-none z-0" />
                                            <div className="z-10 flex flex-col h-full justify-between">
                                                <div>
                                                    <span className={`inline-block px-3 py-1 text-[8px] font-bold uppercase tracking-widest rounded-full mb-6 ${cat.pillBg} ${cat.pillText}`}>
                                                        {catKey === "The Last Chord" ? "Manifesto" : "Section"}
                                                    </span>
                                                    <h3 className="font-serif text-3xl italic leading-tight mb-4">{cat.title}</h3>
                                                </div>
                                                <p className="text-xs font-light leading-relaxed italic opacity-70 max-w-sm">
                                                    {cat.desc}
                                                </p>
                                                <div className="mt-6 flex items-center space-x-2 text-[9px] uppercase tracking-[0.3em] font-bold opacity-40 group-hover:opacity-100 group-hover:translate-x-2 transition-all">
                                                    <span>Explore Deck</span>
                                                    <span>→</span>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        ) : filteredStandardItems.length === 0 ? (
                            <div className="text-center py-20 opacity-40 text-xs uppercase tracking-widest animate-fade-in">Loading Deck Assets...</div>
                        ) : (
                            <div className={`grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 grid-layout ${theme.layoutGrid}`}>
                                {filteredStandardItems.map((item, idx) => renderCard(item, activeTab, idx))}
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div className={`min-h-screen flex flex-col ${theme.bg} ${theme.text} transition-colors duration-300 relative`}>
                    {getPageHeader(activeTab) && (
                        <header className={`w-full text-center py-6 border-b ${theme.border} opacity-40 text-[9px] uppercase tracking-[0.4em] font-bold px-4 animate-fade-in`}>
                            {getPageHeader(activeTab)}
                        </header>
                    )}

                    <main className="flex-grow flex flex-col w-full">
                        {renderContent()}
                    </main>

                    {/* Navigation bar placed at the bottom of the page */}
                    <nav className={`sticky bottom-0 z-50 ${theme.navBg} backdrop-blur-md border-t ${theme.border} px-4 md:px-8 py-4 transition-colors`}>
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center space-x-6">
                                <button 
                                    onClick={() => { setViewingCollection(false); setActiveTab('Home'); }}
                                    className="font-serif text-xl italic tracking-tight hover:opacity-70 transition-opacity"
                                >
                                    The Last Chord
                                </button>
                                <button 
                                    onClick={() => setDarkMode(!darkMode)}
                                    className={`text-[9px] uppercase tracking-widest border ${theme.pillBorder} px-2.5 py-1 rounded-full opacity-60 hover:opacity-100 transition-all font-bold`}
                                >
                                    {darkMode ? 'Light Mode' : 'Dark Mode'}
                                </button>
                            </div>
                            
                            <div className="flex flex-wrap justify-center items-center gap-1 text-[10px] uppercase tracking-[0.2em] font-bold">
                                {['Home', 'Songs', 'London', 'Articles', 'New In Tech'].map((tab) => (
                                    <button
                                        key={tab}
                                        onClick={() => { setViewingCollection(false); setActiveTab(tab); }}
                                        className={`px-4 py-2 transition-all rounded-none ${activeTab === tab && !viewingCollection ? 'opacity-100 underline underline-offset-4 bg-current/5' : 'opacity-40 hover:opacity-80'}`}
                                    >
                                        {tab}
                                    </button>
                                ))}
                                <button
                                    onClick={() => setViewingCollection(true)}
                                    className={`ml-2 px-4 py-2 border ${theme.pillBorder} transition-all font-bold text-[9px] tracking-[0.2em] flex items-center space-x-1.5 ${viewingCollection ? 'bg-current text-current invert opacity-100' : 'opacity-60 hover:opacity-100'}`}
                                >
                                    <span>My Collection</span>
                                    <span className="opacity-60 text-[8px]">({favorites.length})</span>
                                </button>
                            </div>
                        </div>
                    </nav>
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
