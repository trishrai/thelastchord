<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Last Chord</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:italic,bold&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #D1E2F2; /* Steel Blue */
            color: #001F3F; 
            font-family: 'Inter', sans-serif; 
        }
        .font-serif { font-family: 'Libre Baskerville', serif; }
        
        /* Custom Scrollbar */
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(230, 240, 250, 0.3); border-radius: 10px; }

        /* Remove any weird gaps in the grid */
        .grid { gap: 1px !important; background-color: rgba(0, 31, 63, 0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState('Home');
            const [data, setData] = useState({ Songs: [], London: [], Articles: [], Tech: [] });

            const CSV_LINKS = {
                Songs: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSyk-CW-uRScOp42schBcPTBMBIfu8RtGJtDlNkmn2fHnvqoI5GiXKEYiYv62nzVk6aemxQp7cdCamh/pub?gid=0&single=true&output=csv",
                London: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSyk-CW-uRScOp42schBcPTBMBIfu8RtGJtDlNkmn2fHnvqoI5GiXKEYiYv62nzVk6aemxQp7cdCamh/pub?gid=1791301794&single=true&output=csv",
                Articles: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSyk-CW-uRScOp42schBcPTBMBIfu8RtGJtDlNkmn2fHnvqoI5GiXKEYiYv62nzVk6aemxQp7cdCamh/pub?gid=116420010&single=true&output=csv",
                Tech: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSyk-CW-uRScOp42schBcPTBMBIfu8RtGJtDlNkmn2fHnvqoI5GiXKEYiYv62nzVk6aemxQp7cdCamh/pub?gid=1956240315&single=true&output=csv"
            };

            useEffect(() => {
                Object.keys(CSV_LINKS).forEach(key => {
                    Papa.parse(CSV_LINKS[key], {
                        download: true, header: true, skipEmptyLines: true,
                        complete: (results) => { setData(prev => ({ ...prev, [key]: results.data })); }
                    });
                });
            }, []);

            const renderContent = () => {
                if (activeTab === 'Home') return (
    <div className="flex flex-col md:flex-row items-center justify-center p-6 min-h-[75vh] gap-12 md:gap-24 animate-in fade-in duration-1000">
        {/* Left: Branding */}
        <div className="flex flex-col items-center md:items-start text-center md:text-left">
            <img src="logo.png" alt="TLC" className="max-w-[180px] md:max-w-[220px] mb-8 mix-blend-multiply" onError={(e) => e.target.style.display='none'} />
            <h1 className="text-6xl md:text-8xl font-serif italic tracking-tighter leading-tight mb-4">The Last Chord</h1>
            <p className="max-w-xs text-[10px] uppercase tracking-[0.6em] font-bold opacity-40 mb-10 leading-loose">London / Sound / Digital Culture</p>
            <div className="flex flex-wrap justify-center md:justify-start gap-4">
                <button onClick={() => setActiveTab('Songs')} className="border border-[#001F3F] px-10 py-4 hover:bg-[#001F3F] hover:text-[#D1E2F2] transition-all uppercase tracking-[0.3em] text-[9px] font-bold">Catalogue</button>
                <a href="https://thelastchord.substack.com/" target="_blank" className="bg-[#001F3F] text-[#D1E2F2] px-10 py-4 hover:opacity-80 transition-all uppercase tracking-[0.3em] text-[9px] font-bold">Newsletter</a>
            </div>
        </div>

        {/* Vertical Divider Line */}
        <div className="hidden md:block w-px h-64 bg-[#001F3F]/10"></div>
        
        {/* Right: Editorial Sidebar */}
        <div className="flex flex-col text-left space-y-8 max-w-xs">
            <h2 className="text-[10px] uppercase tracking-[0.4em] font-bold border-b border-[#001F3F]/20 pb-2 opacity-60">In This Issue</h2>
            <div className="space-y-6">
                <div>
                    <span className="text-[9px] font-serif italic opacity-40 block mb-1">01. Sound</span>
                    <p className="text-sm italic font-serif leading-snug">The 5-track ritual: Weekly curation for the urban walker.</p>
                </div>
                <div>
                    <span className="text-[9px] font-serif italic opacity-40 block mb-1">02. Space</span>
                    <p className="text-sm italic font-serif leading-snug">Hidden brutalist gems and concrete quietude in London.</p>
                </div>
                <div>
                    <span className="text-[9px] font-serif italic opacity-40 block mb-1">03. Tech</span>
                    <p className="text-sm italic font-serif leading-snug">Digital minimalism: Why the 'Slow Web' is regaining pace.</p>
                </div>
            </div>
        </div>
    </div>
);

                const listKey = activeTab === 'New In Tech' ? 'Tech' : activeTab;
                const items = data[listKey] || [];
                const isListView = activeTab === 'Articles' || activeTab === 'New In Tech';

                if (isListView) {
                    return (
                        <div className="flex flex-col max-w-2xl mx-auto px-6 pb-64 space-y-24 mt-16">
                            {items.map((item, i) => (
                                <a href={item.Link} target="_blank" key={i} className="group block text-center border-b border-[#001F3F]/10 pb-16">
                                    <h2 className="font-serif text-4xl italic mb-6 group-hover:opacity-50 transition-all leading-tight">{item.Title}</h2>
                                    <p className="text-xs font-light leading-relaxed opacity-60 italic max-w-md mx-auto">"{item.Summary}"</p>
                                </a>
                            ))}
                        </div>
                    );
                }

                return (
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 p-0.5 pb-80">
                        {items.map((item, i) => {
                            const title = item.Title || item.Name;
                            const subtitle = item.Artist || item.Category;
                            const link = item.Spotify || item.Link;
                            const description = item.Review || item.Description || item.description || "";

                            return (
                                <div key={i} className="group relative overflow-hidden h-[550px] bg-white">
                                    {/* Constant B&W Image Background */}
                                    <div className="absolute inset-0 z-10">
                                        {item.Image && <img src={item.Image} className="w-full h-full object-cover grayscale opacity-90" />}
                                    </div>

                                    {/* Default Label (Bottom) */}
                                    <div className="absolute bottom-0 left-0 w-full p-8 bg-gradient-to-t from-white via-white/80 to-transparent z-20 group-hover:opacity-0 transition-opacity duration-300">
                                        <h3 className="font-serif text-2xl italic leading-tight">{title}</h3>
                                        <p className="text-[10px] uppercase tracking-[0.3em] font-bold opacity-50">{subtitle}</p>
                                    </div>

                                    {/* NAVY OVERLAY (Fades in on Hover) */}
                                    <div className="absolute inset-0 bg-[#001F3F] opacity-0 group-hover:opacity-100 transition-all duration-500 z-40 flex flex-col p-10 text-[#E6F0FA]">
                                        <div className="flex justify-between text-[8px] uppercase tracking-[0.4em] opacity-40 mb-10 italic font-bold">
                                        </div>
                                        
                                        <h3 className="font-serif text-3xl italic mb-2">{title}</h3>
                                        <p className="text-[10px] uppercase tracking-widest font-bold opacity-50 mb-8 border-b border-[#E6F0FA]/20 pb-4">{subtitle}</p>
                                        
                                        <div className="mb-8 space-y-1.5 text-[9px] uppercase tracking-[0.2em] opacity-60 italic font-light">
                                            {item.Album && <p>Album: {item.Album}</p>}
                                            {item.Year && <p>Release: {item.Year}</p>}
                                            {item.Location && <p>Postcode: {item.Location}</p>}
                                        </div>

                                        <div className="flex-grow overflow-y-auto custom-scroll mb-8 pr-4">
                                            <p className="text-xs font-light leading-relaxed italic opacity-90">
                                                {description ? `"${description}"` : "Entry awaiting review."}
                                            </p>
                                        </div>

                                        {link && (
                                            <a href={link} target="_blank" className="mt-auto border border-[#E6F0FA] py-4 text-[9px] uppercase tracking-[0.4em] font-bold text-center hover:bg-[#E6F0FA] hover:text-[#001F3F] transition-all">
                                                {activeTab === 'Songs' ? "Listen On Spotify" : "View Map"}
                                            </a>
                                        )}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                );
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <nav className="fixed top-0 w-full bg-[#E6F0FA]/90 backdrop-blur-md z-50 px-8 py-6 flex justify-between items-center border-b border-[#001F3F]/10">
                        <button onClick={() => setActiveTab('Home')} className="hover:opacity-50 transition-opacity"><img src="logo.png" alt="TLC" className="h-8 md:h-10 mix-blend-multiply" /></button>
                        <div className="text-[9px] uppercase tracking-[0.5em] font-bold px-4 py-1.5 border border-[#001F3F] rounded-full">{activeTab}</div>
                    </nav>

                    <main className="pt-24 flex-grow mx-auto w-full max-w-[1600px]">
                        {renderContent()}
                    </main>

                    <footer className="fixed bottom-0 w-full bg-[#E6F0FA]/95 backdrop-blur-md border-t border-[#001F3F]/10 flex justify-around p-6 text-[9px] uppercase font-bold tracking-[0.2em] z-50 shadow-sm">
                        {['Home', 'Songs', 'London', 'Articles', 'New In Tech'].map(tab => (
                            <button key={tab} onClick={() => setActiveTab(tab)} className={activeTab === tab ? "text-[#001F3F] border-b border-[#001F3F]" : "opacity-30 hover:opacity-100 transition-all"}>
                                {tab}
                            </button>
                        ))}
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
