<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Last Chord</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:italic,bold&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #D1E2F2; color: #001F3F; font-family: 'Inter', sans-serif; }
        .font-serif { font-family: 'Libre Baskerville', serif; }
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(0, 31, 63, 0.2); border-radius: 10px; }
        .grid-layout { gap: 1px !important; background-color: rgba(0, 31, 63, 0.1); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeInUp 1.2s ease-out forwards; }
        .delay-1 { animation-delay: 0.2s; opacity: 0; }
        .delay-2 { animation-delay: 0.4s; opacity: 0; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState('Home');
            const [data, setData] = useState({ Songs: [], London: [], Articles: [], Tech: [] });

            const CSV_LINKS = {
                Songs: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSyk-CW-uRScOp42schBcPTBMBIfu8RtGJtDlNkmn2fHnvqoI5GiXKEYiYv62nzVk6aemxQp7cdCamh/pub?gid=0&single=true&output=csv",
                London: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSyk-CW-uRScOp42schBcPTBMBIfu8RtGJtDlNkmn2fHnvqoI5GiXKEYiYv62nzVk6aemxQp7cdCamh/pub?gid=1791301794&single=true&output=csv",
                Articles: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSyk-CW-uRScOp42schBcPTBMBIfu8RtGJtDlNkmn2fHnvqoI5GiXKEYiYv62nzVk6aemxQp7cdCamh/pub?gid=116420010&single=true&output=csv",
                Tech: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSyk-CW-uRScOp42schBcPTBMBIfu8RtGJtDlNkmn2fHnvqoI5GiXKEYiYv62nzVk6aemxQp7cdCamh/pub?gid=1956240315&single=true&output=csv"
            };

            useEffect(() => {
                Object.keys(CSV_LINKS).forEach(key => {
                    Papa.parse(CSV_LINKS[key], {
                        download: true, header: true, skipEmptyLines: true,
                        complete: (results) => {
                            const cleanData = results.data.map(row => {
                                const newRow = {};
                                Object.keys(row).forEach(k => { newRow[k.toLowerCase().trim()] = row[k]; });
                                return newRow;
                            });
                            setData(prev => ({ ...prev, [key]: cleanData }));
                        }
                    });
                });
            }, []);

            const renderContent = () => {
                if (activeTab === 'Home') return (
                    <div className="flex flex-col items-center justify-center p-6 min-h-[75vh] text-center">
                        <div className="mb-12 animate-fade-in">
                             <h1 className="text-6xl md:text-8xl font-serif italic tracking-tighter leading-none">The Last Chord</h1>
                             <p className="text-[10px] uppercase tracking-[0.6em] font-bold opacity-40 mt-6 leading-loose">BY TRISHA RAI // EST. 2025</p>
                        </div>
                        <div className="flex flex-col items-center space-y-8 animate-fade-in delay-1">
                            <div className="group relative">
                                <a href="https://thelastchord.substack.com" target="_blank" className="block border border-[#001F3F] px-16 py-6 hover:bg-[#001F3F] hover:text-[#D1E2F2] transition-all uppercase tracking-[0.4em] text-[10px] font-bold relative z-10">Read On Substack</a>
                                <div className="absolute top-2 left-2 w-full h-full border border-[#001F3F]/10 -z-0"></div>
                            </div>
                            <p className="max-w-xs text-[11px] italic font-serif opacity-60 leading-relaxed animate-fade-in delay-2">Curated dispatches on the intersection of culture and the digital frontier.</p>
                        </div>
                    </div>
                );

                const items = data[activeTab === 'New In Tech' ? 'Tech' : activeTab] || [];
                
                // Keep ONLY "New In Tech" as the text-list view, move Articles to Visual Grid
                const isListView = activeTab === 'New In Tech';

                return (
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 grid-layout p-0.5 pb-80 mt-4">
                        {items.map((item, i) => {
                            const title = item.title || item.name || "Untitled";
                            const sub = item.artist || item.category || (activeTab === 'Articles' ? 'Editorial' : '');
                            const img = item.image || "";
                            const finalLink = item.spotify || item.link || item.url;
                            const bodyText = item.review || item.description || item.summary || "";
                            
                            const album = item.album || "";
                            const year = item.year || "";
                            const location = item.location || "";

                            if (isListView) return (
                                <a href={finalLink} target="_blank" key={i} className="group bg-[#D1E2F2] p-10 flex flex-col justify-between hover:bg-[#001F3F] hover:text-[#D1E2F2] transition-all duration-300 min-h-[300px] border border-[#001F3F]/5">
                                    <div>
                                        <h2 className="font-serif text-2xl italic mb-6 leading-tight">{title}</h2>
                                        <p className="text-[11px] font-light leading-relaxed opacity-60 italic group-hover:opacity-80">"{bodyText}"</p>
                                    </div>
                                    <div className="mt-8 text-[9px] uppercase tracking-widest font-bold opacity-40 group-hover:opacity-100">Read Entry →</div>
                                </a>
                            );

                            return (
                                <div key={i} className="group relative overflow-hidden h-[550px] bg-white">
                                    <div className="absolute inset-0 z-10">
                                        {img ? (
                                            <img src={img} className="w-full h-full object-cover grayscale opacity-90 transition-transform duration-700 group-hover:scale-110" />
                                        ) : (
                                            <div className="w-full h-full bg-[#001F3F]/5 flex items-center justify-center text-[10px] uppercase tracking-widest opacity-20">No Image provided</div>
                                        )}
                                    </div>
                                    <div className="absolute bottom-0 left-0 w-full p-8 bg-gradient-to-t from-white via-white/80 to-transparent z-20 group-hover:opacity-0 transition-opacity duration-300">
                                        <h3 className="font-serif text-2xl italic leading-tight">{title}</h3>
                                        <p className="text-[10px] uppercase tracking-[0.3em] font-bold opacity-50">{sub}</p>
                                    </div>
                                    <div className="absolute inset-0 bg-[#001F3F] opacity-0 group-hover:opacity-100 transition-all duration-500 z-40 flex flex-col p-10 text-[#E6F0FA]">
                                        <h3 className="font-serif text-3xl italic mb-2">{title}</h3>
                                        <p className="text-[10px] uppercase tracking-widest font-bold opacity-50 mb-6 border-b border-[#E6F0FA]/20 pb-4">{sub}</p>
                                        
                                        <div className="mb-6 space-y-1 text-[9px] uppercase tracking-[0.2em] opacity-60 italic font-light">
                                            {album && <p>Album: {album}</p>}
                                            {year && <p>Released: {year}</p>}
                                            {location && <p>Location: {location}</p>}
                                        </div>

                                        <div className="flex-grow overflow-y-auto custom-scroll mb-8 pr-2">
                                            <p className="text-xs font-light leading-relaxed italic opacity-90">
                                                {bodyText ? `"${bodyText}"` : "Editorial pending."}
                                            </p>
                                        </div>

                                        {finalLink && (
                                            <a href={finalLink} target="_blank" className="mt-auto border border-[#E6F0FA] py-4 text-[9px] uppercase tracking-[0.4em] font-bold text-center hover:bg-[#E6F0FA] hover:text-[#001F3F] transition-all">
                                                Read Full Article
                                            </a>
                                        )}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                );
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <nav className="fixed top-0 w-full bg-[#D1E2F2]/90 backdrop-blur-md z-50 px-8 py-4 flex justify-between items-center border-b border-[#001F3F]/10">
                        <button onClick={() => setActiveTab('Home')}><img src="Logo.jpeg" alt="TLC" className="h-12 w-12 rounded-full object-cover border border-[#001F3F]/20 shadow-sm" /></button>
                        <div className="text-[9px] uppercase tracking-[0.5em] font-bold px-4 py-1.5 border border-[#001F3F] rounded-full">{activeTab}</div>
                    </nav>
                    <main className="pt-24 flex-grow mx-auto w-full max-w-[1600px]">{renderContent()}</main>
                    <footer className="fixed bottom-0 w-full bg-[#D1E2F2]/95 backdrop-blur-md border-t border-[#001F3F]/10 flex justify-around p-6 text-[9px] uppercase font-bold tracking-[0.2em] z-50 shadow-sm">
                        {['Home', 'Songs', 'London', 'Articles', 'New In Tech'].map(tab => (
                            <button key={tab} onClick={() => setActiveTab(tab)} className={activeTab === tab ? "text-[#001F3F] border-b border-[#001F3F]" : "opacity-30 hover:opacity-100 transition-all"}>{tab}</button>
                        ))}
                    </footer>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
