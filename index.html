<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Last Chord</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:ital,wght@0,400;1,700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
        }
        .font-serif {
            font-family: 'Playfair Display', serif;
        }
        .font-display {
            font-family: 'Cinzel Decorative', serif;
        }
        /* Custom horizontal grid layouts */
        .grid-layout > div {
            border-bottom: 1px solid currentColor;
            border-right: 1px solid currentColor;
        }
        @media (min-width: 768px) {
            .grid-layout > div:nth-child(2n) { border-right: none; }
        }
        @media (min-width: 1024px) {
            .grid-layout > div:nth-child(2n) { border-right: 1px solid currentColor; }
            .grid-layout > div:nth-child(3n) { border-right: none; }
        }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'fade-in': 'fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(8px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="antialiased selection:bg-current selection:text-transparent">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- STEP 5 DATA MAP CONFIGURATION ---
        // Swap out your raw GitHub image paths here when ready!
        const CATEGORY_MAP = {
            "Off The Record: Opinion Pieces": {
                title: "Off The Record: Opinions",
                desc: "Welcome to Off the Record, where art meets insight. We offer sharp, unfiltered opinion pieces on cultural shifts, the evolution of sound, and the timeless debates shaping the industry.",
                imgUrl: "https://images.unsplash.com/photo-1516280440614-37939bbacd6a?auto=format&fit=crop&q=80&w=600", 
                pillBg: "bg-red-500/10", pillText: "text-red-400"
            },
            "The Sonic Lens: Analysis": {
                title: "The Sonic Lens: Analysis",
                desc: "Welcome to The Sonic Lens. We examine the intersection of art, culture, and society through a critical eye. From the evolution of musical traditions to the impact of iconic movements, we offer thought-provoking analysis on how art shapes our world.",
                imgUrl: "https://images.unsplash.com/photo-1511379938547-c1f69419868d?auto=format&fit=crop&q=80&w=600",
                pillBg: "bg-blue-500/10", pillText: "text-blue-400"
            },
            "Studio Sessions: Interviews": {
                title: "Studio Sessions: Interviews",
                desc: "Welcome to Studio Sessions, where creativity meets conversation. We interview musicians, writers, and visual creators to uncover the stories behind their art. Dive deep into the processes, struggles, and passions that drive the creative world.",
                imgUrl: "https://images.unsplash.com/photo-1590602847861-f357a9332bbc?auto=format&fit=crop&q=80&w=600",
                pillBg: "bg-emerald-500/10", pillText: "text-emerald-400"
            },
            "Soundcheck: Reviews": {
                title: "Soundcheck: Reviews",
                desc: "Welcome to Soundcheck, the reviews section of The Last Chord. We cover albums, films, art, and culture that leave a mark. Beyond simple critiques, we unpack the storytelling, rebellion, and raw emotion behind every piece.",
                imgUrl: "https://images.unsplash.com/photo-1484755560693-a4074577af3a?auto=format&fit=crop&q=80&w=600",
                pillBg: "bg-amber-500/10", pillText: "text-amber-400"
            }
        };

        // Static Mock Data Assets
        const MOCK_DATA = [
            { id: 1, title: "Ghost Notes In The Capital", type: "Songs", date: "2026-05-12", excerpt: "Tracking down missing audio spaces through architectural layout mapping.", author: "E. Vance" },
            { id: 2, title: "Hackney Modular Spaces", type: "London", date: "2026-06-01", excerpt: "Inside the DIY synth basements reconstructing East London dance landscapes.", author: "M. Cross" },
            { id: 3, title: "Spatial Traps vs Pure Analog", type: "New In Tech", date: "2026-06-14", excerpt: "Are we sacrificing phase realities for artificial room widths?", author: "Dr. K. Aris" },
            { id: 4, title: "The Vinyl Revival Mythos", type: "Off The Record: Opinion Pieces", date: "2026-04-20", excerpt: "Why direct metal mastering plants are fighting a hidden bottleneck.", author: "E. Vance" }
        ];

        const App = () => {
            const [darkMode, setDarkMode] = useState(true);
            const [activeTab, setActiveTab] = useState('Home');
            const [viewingCollection, setViewingCollection] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedCategory, setSelectedCategory] = useState('Landing');
            const [sortOrder, setSortOrder] = useState('newest');
            const [hoveredCategory, setHoveredCategory] = useState(null);
            const [favorites, setFavorites] = useState([]);

            // Theme definitions Matrix
            const theme = {
                bg: darkMode ? 'bg-[#121212]' : 'bg-[#FAFAFA]',
                text: darkMode ? 'text-[#F5EFE6]' : 'text-[#001F3F]',
                border: darkMode ? 'border-[#F5EFE6]/10' : 'border-[#001F3F]/10',
                cardBg: darkMode ? 'bg-[#1C1C1E]' : 'bg-white',
                navBg: darkMode ? 'bg-[#121212]/80' : 'bg-[#FAFAFA]/80',
                pillBorder: darkMode ? 'border-[#F5EFE6]/20' : 'border-[#001F3F]/20',
                layoutGrid: darkMode ? 'border-[#F5EFE6]/10 text-[#F5EFE6]' : 'border-[#001F3F]/10 text-[#001F3F]'
            };

            const toggleFavorite = (id) => {
                setFavorites(prev => prev.includes(id) ? prev.filter(fId => fId !== id) : [...prev, id]);
            };

            // --- STEP 3: GOOGLE SHEETS HANDLER ENGINE ---
            const handleSignupSubmit = async (e) => {
                e.preventDefault();
                const emailInput = e.target.elements.email.value;
                if (!emailInput) return;

                try {
                    // Replace string below with your active App Script Production URL macro endpoint
                    const WEB_APP_URL = "YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE";
                    
                    await fetch(WEB_APP_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: new URLSearchParams({ 'email': emailInput })
                    });
                    
                    alert("Welcome to the Collective.");
                    e.target.reset();
                } catch (error) {
                    console.error("Signup network execution error:", error);
                    alert("Something failed. Please attempt registration manually again.");
                }
            };

            const getPageHeader = (tab) => {
                if (viewingCollection) return "Curated Archive Assets";
                switch(tab) {
                    case 'Songs': return "Vibrational Index / Audio Tracks";
                    case 'London': return "Geographic Soundscapes & Mapping";
                    case 'New In Tech': return "Hardware Logs / Digital Architecture";
                    case 'Articles': return selectedCategory === 'Landing' ? "Editorial Directories" : `Journal // ${selectedCategory}`;
                    default: return null;
                }
            };

            const renderCard = (item, tabOrigin, idx) => {
                const isFav = favorites.includes(item.id);
                return (
                    <div key={item.id || idx} className={`p-8 md:p-12 flex flex-col justify-between group h-[380px] transition-all animate-fade-in`}>
                        <div className="space-y-4">
                            <div className="flex justify-between items-center text-[9px] uppercase tracking-widest opacity-40 font-bold">
                                <span>{item.date}</span>
                                <span>By {item.author}</span>
                            </div>
                            <h4 className="font-serif text-2xl tracking-tight leading-tight italic">{item.title}</h4>
                            <p className="text-xs opacity-70 font-light leading-relaxed max-w-sm">{item.excerpt}</p>
                        </div>
                        
                        <div className="flex justify-between items-center mt-6">
                            {/* --- STEP 1: FIXED SPOTIFY HOVER TRANSITIONS --- */}
                            <button className="group relative border border-current px-5 py-2.5 transition-all duration-300 hover:bg-white hover:text-black bg-transparent">
                                <span className="text-[9px] uppercase tracking-widest font-bold block">Listen On Spotify</span>
                            </button>
                            
                            <button onClick={() => toggleFavorite(item.id)} className="text-[10px] uppercase tracking-widest opacity-40 hover:opacity-100 font-bold tracking-[0.2em] transition-opacity">
                                {isFav ? "[- Remove]" : "[+ Save]"}
                            </button>
                        </div>
                    </div>
                );
            };

            const renderHome = () => (
                <div className="flex-grow flex flex-col justify-center items-center px-4 py-20 text-center max-w-3xl mx-auto space-y-8 animate-fade-in">
                    <h2 className="font-display text-4xl md:text-6xl tracking-widest leading-none font-light uppercase">
                        The Last <br/><span class="font-serif italic tracking-normal lowercase text-3xl md:text-5xl">chord</span>
                    </h2>
                    <p className="text-xs md:text-sm font-light leading-relaxed tracking-wide italic opacity-70 max-w-xl">
                        "An archive exploring sonic frameworks, modular architectures, global counter-culture frequencies, and forgotten acoustic undergrounds."
                    </p>
                    <div className="w-full max-w-md pt-8 border-t border-current/10">
                        {/* --- STEP 3: INTEGRATED SIGNUP ATTACHMENT FORM --- */}
                        <form onSubmit={handleSignupSubmit} className="flex flex-col items-center space-y-4">
                            <input 
                                type="email" 
                                name="email"
                                required
                                placeholder="ENTER EMAIL TO ENTER LOGS" 
                                className={`w-full bg-transparent border-b ${theme.border} py-3 text-xs uppercase tracking-widest outline-none text-center font-light placeholder:opacity-30 focus:border-current transition-colors`}
                            />
                            <button type="submit" className="text-[9px] uppercase tracking-[0.4em] font-bold opacity-60 hover:opacity-100 transition-opacity">
                                [ Submit Payload ]
                            </button>
                        </form>
                    </div>
                </div>
            );

            const renderContent = () => {
                if (viewingCollection) {
                    const collectionItems = MOCK_DATA.filter(item => favorites.includes(item.id));
                    return (
                        <div className="flex flex-col w-full">
                            {collectionItems.length === 0 ? (
                                <div className="text-center py-20 opacity-40 text-xs uppercase tracking-widest animate-fade-in">No Records Found! Start Saving To Your Collection</div>
                            ) : (
                                <div className={`grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 grid-layout ${theme.layoutGrid}`}>
                                    {collectionItems.map((f, idx) => renderCard(f, 'Collection', idx))}
                                </div>
                            )}
                        </div>
                    );
                }

                if (activeTab === 'Home') return renderHome();

                const filteredStandardItems = MOCK_DATA.filter(item => {
                    const matchesTab = activeTab === 'Articles' ? ['Off The Record: Opinion Pieces', 'The Sonic Lens: Analysis', 'Studio Sessions: Interviews', 'Soundcheck: Reviews'].includes(item.type) : item.type === activeTab;
                    const matchesCategory = activeTab === 'Articles' && selectedCategory !== 'All' && selectedCategory !== 'Landing' ? item.type === selectedCategory : true;
                    const matchesSearch = item.title.toLowerCase().includes(searchQuery.toLowerCase()) || item.excerpt.toLowerCase().includes(searchQuery.toLowerCase());
                    return matchesTab && matchesCategory && matchesSearch;
                });

                return (
                    <div className="flex flex-col w-full">
                        <div className="w-full px-4 md:px-8 max-w-xl mx-auto mb-8 mt-2 flex flex-col items-center space-y-5 animate-fade-in">
                            <input 
                                type="text"
                                placeholder={`Search ${activeTab}...`}
                                value={searchQuery}
                                onChange={(e) => setSearchQuery(e.target.value)}
                                className={`w-full max-w-xs bg-transparent border-b ${darkMode ? 'border-[#F5EFE6]/30 focus:border-[#F5EFE6]' : 'border-[#001F3F]/20 focus:border-[#001F3F]'} py-2 text-xs uppercase tracking-widest outline-none text-center transition-colors font-light placeholder:opacity-40`}
                            />
                            
                            {activeTab === 'Articles' && searchQuery.trim() === '' && (
                                <div className="flex flex-col items-center space-y-2 w-full max-w-xs">
                                    <label className="text-[8px] uppercase tracking-[0.3em] opacity-40 font-bold">Filter By Collection</label>
                                    <select 
                                        value={selectedCategory}
                                        onChange={(e) => setSelectedCategory(e.target.value)}
                                        className={`w-full bg-transparent border ${darkMode ? 'border-[#F5EFE6]/30 text-[#F5EFE6] bg-[#1C1C1E]' : 'border-[#001F3F]/20 text-[#001F3F] bg-white'} px-4 py-3 text-[10px] uppercase tracking-widest outline-none rounded-none cursor-pointer font-bold`}
                                    >
                                        <option value="Landing">Index Display</option>
                                        <option value="All">All Articles (Chronological)</option>
                                        <option value="Off The Record: Opinion Pieces">Off The Record: Opinions</option>
                                        <option value="The Sonic Lens: Analysis">The Sonic Lens: Analysis</option>
                                        <option value="Studio Sessions: Interviews">Studio Sessions: Interviews</option>
                                        <option value="Soundcheck: Reviews">Soundcheck: Reviews</option>
                                    </select>
                                </div>
                            )}

                            {activeTab === 'Articles' && selectedCategory === 'All' && searchQuery.trim() === '' && (
                                <div className="flex items-center space-x-4 text-[9px] uppercase tracking-widest opacity-60">
                                    <button onClick={() => setSortOrder('newest')} className={`font-bold ${sortOrder === 'newest' ? 'underline' : 'opacity-50'}`}>Newest</button>
                                    <span>|</span>
                                    <button onClick={() => setSortOrder('oldest')} className={`font-bold ${sortOrder === 'oldest' ? 'underline' : 'opacity-50'}`}>Oldest</button>
                                </div>
                            )}
                        </div>

                        {activeTab === 'Articles' && selectedCategory === 'Landing' && searchQuery.trim() === '' ? (
                            <div className={`grid grid-cols-1 md:grid-cols-2 grid-layout ${theme.layoutGrid} border-t ${theme.border}`}>
                                {Object.keys(CATEGORY_MAP).map((catKey) => {
                                    const cat = CATEGORY_MAP[catKey];
                                    return (
                                        <div 
                                            key={catKey}
                                            onClick={() => setSelectedCategory(catKey)}
                                            onMouseEnter={() => setHoveredCategory(catKey)}
                                            onMouseLeave={() => setHoveredCategory(null)}
                                            className={`relative h-[400px] ${theme.cardBg} flex flex-col justify-between p-10 cursor-pointer overflow-hidden transition-all duration-500 animate-fade-in group`}
                                        >
                                            {/* --- STEP 5: CONDITIONAL CATEGORY BACKGROUND GRAPHICS RENDER --- */}
                                            {cat.imgUrl && (
                                                <div className="absolute inset-0 z-0 overflow-hidden mix-blend-luminosity opacity-20 group-hover:opacity-40 transition-opacity duration-700 pointer-events-none">
                                                    <img 
                                                        src={cat.imgUrl} 
                                                        alt={cat.title} 
                                                        className="w-full h-full object-cover scale-100 group-hover:scale-105 transition-transform duration-700" 
                                                    />
                                                </div>
                                            )}

                                            <div className="absolute inset-0 bg-current opacity-0 group-hover:opacity-[0.02] transition-opacity pointer-events-none z-0" />
                                            <div className="z-10 flex flex-col h-full justify-between pointer-events-none">
                                                <div>
                                                    <span className={`inline-block px-3 py-1 text-[8px] font-bold uppercase tracking-widest rounded-full mb-6 ${cat.pillBg} ${cat.pillText}`}>
                                                        Section
                                                    </span>
                                                    <h3 className="font-serif text-3xl italic leading-tight mb-4">{cat.title}</h3>
                                                </div>
                                                <p className="text-xs font-light leading-relaxed italic opacity-70 max-w-sm">
                                                    {cat.desc}
                                                </p>
                                                <div className="mt-6 flex items-center space-x-2 text-[9px] uppercase tracking-[0.3em] font-bold opacity-40 group-hover:opacity-100 group-hover:translate-x-2 transition-all">
                                                    <span>Explore Deck</span>
                                                    <span>→</span>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        ) : filteredStandardItems.length === 0 ? (
                            <div className="text-center py-20 opacity-40 text-xs uppercase tracking-widest animate-fade-in">Loading Deck Assets...</div>
                        ) : (
                            <div className={`grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 grid-layout ${theme.layoutGrid}`}>
                                {filteredStandardItems.map((item, idx) => renderCard(item, activeTab, idx))}
                            </div>
                        )}
                    </div>
                );
            };

            // --- STEP 4: REDESIGNED LAYOUT STRUCTURE RETURN ---
            return (
                <div className={`min-h-screen flex flex-col ${theme.bg} ${theme.text} transition-colors duration-300 relative pb-24`}>
                    
                    {/* TOP BRAND HEADER HEADER */}
                    <header className={`w-full py-6 px-6 md:px-12 border-b ${theme.border} flex flex-col sm:flex-row justify-between items-center gap-4 animate-fade-in`}>
                        <button 
                            onClick={() => { setViewingCollection(false); setActiveTab('Home'); }}
                            className="font-serif text-2xl italic tracking-tight hover:opacity-70 transition-opacity focus:outline-none"
                        >
                            The Last Chord
                        </button>
                        
                        <div className="flex items-center space-x-6">
                            {getPageHeader(activeTab) && (
                                <span className="opacity-40 text-[9px] uppercase tracking-[0.4em] font-bold text-center sm:text-right hidden sm:inline">
                                    {getPageHeader(activeTab)}
                                </span>
                            )}
                            <button 
                                onClick={() => setDarkMode(!darkMode)}
                                className={`text-[9px] uppercase tracking-widest border ${theme.pillBorder} px-3 py-1 rounded-full opacity-60 hover:opacity-100 transition-all font-bold tracking-[0.15em]`}
                            >
                                {darkMode ? 'Light Mode' : 'Dark Mode'}
                            </button>
                        </div>
                    </header>

                    {/* MAIN GRAPHICS INJECTION CONTAINER */}
                    <main className="flex-grow flex flex-col w-full">
                        {renderContent()}
                    </main>

                    {/* DOCKED BOTTOM CENTER NAVIGATION ARCHITECTURE */}
                    <nav className={`fixed bottom-0 left-0 right-0 z-50 ${theme.navBg} backdrop-blur-md border-t ${theme.border} px-4 py-5 transition-colors`}>
                        <div className="max-w-7xl mx-auto flex justify-center items-center">
                            <div className="flex flex-wrap justify-center items-center gap-1 text-[10px] uppercase tracking-[0.2em] font-bold">
                                {['Home', 'Songs', 'London', 'Articles', 'New In Tech'].map((tab) => (
                                    <button
                                        key={tab}
                                        onClick={() => { setViewingCollection(false); setActiveTab(tab); }}
                                        className={`px-4 py-2 transition-all rounded-none ${activeTab === tab && !viewingCollection ? 'opacity-100 underline underline-offset-4 bg-current/5' : 'opacity-40 hover:opacity-80'}`}
                                    >
                                        {tab}
                                    </button>
                                ))}
                                
                                {/* --- STEP 2: FIXED 'MY COLLECTION' ACTIVE CONDITIONAL OVERLAY COLOR STATE --- */}
                                <button
                                    onClick={() => setViewingCollection(true)}
                                    className={`ml-3 px-4 py-2 border ${theme.pillBorder} transition-all font-bold text-[9px] tracking-[0.2em] flex items-center space-x-1.5 rounded-none ${
                                        viewingCollection 
                                            ? `${darkMode ? 'bg-[#F5EFE6] text-[#001F3F]' : 'bg-[#001F3F] text-white'} opacity-100` 
                                            : 'opacity-60 hover:opacity-100'
                                    }`}
                                >
                                    <span>My Collection</span>
                                    <span className="opacity-60 text-[8px]">({favorites.length})</span>
                                </button>
                            </div>
                        </div>
                    </nav>
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
