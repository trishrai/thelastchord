<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Last Chord</title>
    
    <link rel="apple-touch-icon" href="https://trishrai.github.io/thelastchord/Logo.jpeg">
    <link rel="icon" type="image/jpeg" href="https://trishrai.github.io/thelastchord/Logo.jpeg">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="The Last Chord">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; transition: background-color 0.4s ease, color 0.4s ease; }
        .font-serif { font-family: 'Libre Baskerville', serif; }
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(0, 31, 63, 0.2); border-radius: 10px; }
        .grid-layout { gap: 1px !important; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeInUp 0.5s ease-out forwards; }
        .page-header-center { text-align: center; width: 100%; }
        /* Ensure homepage fits on most screens without cutting off subscribe button */
        .home-container { min-height: auto; display: flex; flex-direction: column; justify-content: center; padding: 1rem 0; }
        @media (min-height: 800px) { .home-container { min-height: calc(100vh - 110px); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState(() => {
                return localStorage.getItem('tlc_active_tab') || 'Home';
            });
            
            const [darkMode, setDarkMode] = useState(() => {
                return localStorage.getItem('tlc_dark_mode') === 'true';
            });

            const [favorites, setFavorites] = useState(() => {
                const cachedData = localStorage.getItem('tlc_favorites_v2');
                return cachedData ? JSON.parse(cachedData) : [];
            });

            const [searchQuery, setSearchQuery] = useState('');
            const [viewingCollection, setViewingCollection] = useState(false);
            const [collectionSubFilter, setCollectionSubFilter] = useState('All');
            const [selectedCategory, setSelectedCategory] = useState('Landing'); 
            const [sortOrder, setSortOrder] = useState('newest'); 
            const [hoveredCategory, setHoveredCategory] = useState(null); 
            const [data, setData] = useState({ Songs: [], London: [], Articles: [], Tech: [] });
            
            // Registration state
            const [formData, setFormData] = useState({ firstName: '', lastName: '', email: '', city: '' });
            const [signupStatus, setSignupStatus] = useState('idle');
            const [showCustomCity, setShowCustomCity] = useState(false);
            const [customCityValue, setCustomCityValue] = useState('');
            const [showAboutPanel, setShowAboutPanel] = useState(false);

            const NEWSLETTER_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzCiB2pnQi3LhpahORpDfv6qPnf5hTtHHIZ7-JtvVcAu8a9YKhTTrrTJg3GJjVjvaoPrA/exec";

            const CSV_LINKS = {
                Songs: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSyk-CW-uRScOp42schBcPTBMBIfu8RtGJtDlNkmn2fHnvqoI5GiXKEYiYv62nzVk6aemxQp7cdCamh/pub?gid=0&single=true&output=csv",
                London: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSyk-CW-uRScOp42schBcPTBMBIfu8RtGJtDlNkmn2fHnvqoI5GiXKEYiYv62nzVk6aemxQp7cdCamh/pub?gid=1791301794&single=true&output=csv",
                Articles: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSyk-CW-uRScOp42schBcPTBMBIfu8RtGJtDlNkmn2fHnvqoI5GiXKEYiYv62nzVk6aemxQp7cdCamh/pub?gid=116420010&single=true&output=csv",
                Tech: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSyk-CW-uRScOp42schBcPTBMBIfu8RtGJtDlNkmn2fHnvqoI5GiXKEYiYv62nzVk6aemxQp7cdCamh/pub?gid=1956240315&single=true&output=csv"
            };

            const CATEGORY_MAP = {
                "The Last Chord": {
                    title: "The Last Chord",
                    pillBg: "bg-[#DDEBFA]", pillText: "text-[#1E40AF]",
                    desc: "Welcome to The Last Chord. Read about us here."
                },
                "Off The Record: Opinion Pieces": {
                    title: "Off The Record: Opinion Pieces",
                    pillBg: "bg-[#E2F0D9]", pillText: "text-[#2E7D32]",
                    desc: "Welcome to Off the Record, where art meets insight. We offer sharp, unfiltered opinion pieces on cultural shifts, the evolution of sound, and the timeless debates shaping the industry."
                },
                "The Sonic Lens: Analysis": {
                    title: "The Sonic Lens: Analysis",
                    pillBg: "bg-[#F3E5F5]", pillText: "text-[#6A1B9A]",
                    desc: "Welcome to The Sonic Lens. We examine the intersection of art, culture, and society through a critical eye. From the evolution of musical traditions to the impact of iconic movements, we offer thought-provoking analysis on how art shapes our world."
                },
                "Studio Sessions: Interviews": {
                    title: "Studio Sessions: Interviews",
                    pillBg: "bg-[#E0F2F1]", pillText: "text-[#00695C]",
                    desc: "Welcome to Studio Sessions, where creativity meets conversation. We interview musicians, writers, and visual creators to uncover the stories behind their art. Dive deep into the processes, struggles, and passions that drive the creative world."
                },
                "Soundcheck: Reviews": {
                    title: "Soundcheck: Reviews",
                    pillBg: "bg-[#FCE4EC]", pillText: "text-[#C2185B]",
                    desc: "Welcome to Soundcheck, the reviews section of The Last Chord. We cover albums, films, art, and culture that leave a mark. Beyond simple critiques, we unpack the storytelling, rebellion, and raw emotion behind every piece."
                }
            };

            const theme = {
                bg: darkMode ? 'bg-[#121212]' : 'bg-[#D1E2F2]',
                navBg: darkMode ? 'bg-[#121212]/90' : 'bg-[#D1E2F2]/90',
                footerBg: darkMode ? 'bg-[#121212]/95' : 'bg-[#D1E2F2]/95',
                text: darkMode ? 'text-[#F5EFE6]' : 'text-[#001F3F]',
                border: darkMode ? 'border-[#F5EFE6]/10' : 'border-[#001F3F]/10',
                pillBorder: darkMode ? 'border-[#F5EFE6]' : 'border-[#001F3F]',
                cardBg: darkMode ? 'bg-[#1C1C1E]' : 'bg-white',
                layoutGrid: darkMode ? 'bg-[#F5EFE6]/10' : 'bg-[#001F3F]/10',
                placeholderBg: darkMode ? 'bg-[#F5EFE6]/5' : 'bg-[#001F3F]/5',
                formCard: darkMode ? 'bg-[#1E1E22]/90 border-white/10' : 'bg-white/90 border-[#001F3F]/10'
            };

            useEffect(() => {
                localStorage.setItem('tlc_active_tab', activeTab);
                setSearchQuery(''); 
                if (activeTab === 'Articles') setSelectedCategory('Landing');
            }, [activeTab]);

            useEffect(() => localStorage.setItem('tlc_dark_mode', darkMode), [darkMode]);
            useEffect(() => localStorage.setItem('tlc_favorites_v2', JSON.stringify(favorites)), [favorites]);

            useEffect(() => {
                Object.keys(CSV_LINKS).forEach(key => {
                    Papa.parse(CSV_LINKS[key], {
                        download: true, header: true, skipEmptyLines: true,
                        complete: (results) => {
                            const cleanData = results.data.map(row => {
                                const newRow = {};
                                Object.keys(row).forEach(k => { newRow[k.toLowerCase().trim()] = row[k]; });
                                return newRow;
                            });
                            setData(prev => ({ ...prev, [key]: cleanData.reverse() }));
                        },
                        error: (err) => console.error(`CSV Error ${key}:`, err)
                    });
                });
            }, []);

            const getPageHeader = (tab) => {
                if (viewingCollection) return "YOUR MASTER COLLECTION DECK";
                if (tab === 'Home') return "";
                switch(tab) {
                    case 'Songs': return "SONG RECOMMENDATIONS FROM THE LAST CHORD";
                    case 'London': return "LONDON RECOMMENDATIONS FROM THE LAST CHORD";
                    case 'Articles': return "NEW FROM THE LAST CHORD";
                    case 'New In Tech': return "TECHNOLOGY NEWS FROM OTHER OUTLETS";
                    default: return "";
                }
            };

            const toggleFavorite = (item, originTab) => {
                const title = item.title || item.name || "Untitled";
                const compositeKey = `${originTab}-${title}`;
                setFavorites(prev => {
                    const exists = prev.some(f => f.compositeKey === compositeKey);
                    return exists ? prev.filter(f => f.compositeKey !== compositeKey) : [...prev, { compositeKey, originTab, data: item }];
                });
            };

            const isItemSaved = (itemTitle, originTab) => favorites.some(f => f.compositeKey === `${originTab}-${itemTitle}`);

            const handleFormChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleCitySelect = (e) => {
                const val = e.target.value;
                if (val === "Other (specify)") {
                    setShowCustomCity(true);
                    setFormData(prev => ({ ...prev, city: '' }));
                } else {
                    setShowCustomCity(false);
                    setFormData(prev => ({ ...prev, city: val }));
                }
            };

            const handleCustomCityChange = (e) => {
                const val = e.target.value;
                setCustomCityValue(val);
                setFormData(prev => ({ ...prev, city: val }));
            };

            const handleSubscribe = async (e) => {
                e.preventDefault();
                if (!formData.email.trim()) return;
                setSignupStatus('loading');
                const payload = {
                    Timestamp: new Date().toISOString(),
                    FirstName: formData.firstName.trim(),
                    LastName: formData.lastName.trim(),
                    City: formData.city.trim(),
                    Email: formData.email.trim()
                };
                try {
                    await fetch(NEWSLETTER_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    setSignupStatus('success');
                    setFormData({ firstName: '', lastName: '', email: '', city: '' });
                    setShowCustomCity(false);
                    setCustomCityValue('');
                    setTimeout(() => setSignupStatus('idle'), 4000);
                } catch (error) {
                    setSignupStatus('error');
                    setTimeout(() => setSignupStatus('idle'), 3000);
                }
            };

            const filteredStandardItems = useMemo(() => {
                const currentTabKey = activeTab === 'New In Tech' ? 'Tech' : activeTab;
                let items = data[currentTabKey] || [];
                const effectiveCategory = (activeTab === 'Articles' && selectedCategory === 'Landing' && searchQuery.trim() !== '') ? 'All' : selectedCategory;
                if (activeTab === 'Articles' && effectiveCategory !== 'Landing' && effectiveCategory !== 'All') {
                    items = items.filter(item => (item.summary || "").trim() === effectiveCategory);
                }
                if (activeTab === 'Articles' && effectiveCategory === 'All' && sortOrder === 'oldest') items = items.slice().reverse();
                if (!searchQuery.trim()) return items;
                const query = searchQuery.toLowerCase().trim();
                return items.filter(item => {
                    const title = (item.title || item.name || "").toLowerCase();
                    const sub = (item.artist || item.summary || item.category || "").toLowerCase();
                    const bodyText = (item.description || item.review || "").toLowerCase();
                    return title.includes(query) || sub.includes(query) || bodyText.includes(query);
                });
            }, [data, activeTab, searchQuery, selectedCategory, sortOrder]);

            const filteredCollectionItems = useMemo(() => {
                let items = favorites;
                if (collectionSubFilter !== 'All') {
                    const targetOrigin = collectionSubFilter === 'News in Tech' ? 'New In Tech' : collectionSubFilter;
                    items = items.filter(f => f.originTab === targetOrigin);
                }
                if (!searchQuery.trim()) return items;
                const query = searchQuery.toLowerCase().trim();
                return items.filter(f => {
                    const title = (f.data.title || f.data.name || "").toLowerCase();
                    const sub = (f.data.artist || f.data.summary || f.data.category || "").toLowerCase();
                    const bodyText = (f.data.description || f.data.review || "").toLowerCase();
                    return title.includes(query) || sub.includes(query) || bodyText.includes(query);
                });
            }, [favorites, collectionSubFilter, searchQuery]);

            const renderCard = (item, originTab, index) => {
                const title = item.title || item.name || "Untitled";
                let sub = item.summary || item.artist || item.category || "";
                const img = item.image || "";
                const finalLink = item.link || item.spotify || item.url;
                const bodyText = item.description || item.review || "";
                const album = item.album || "";
                const year = item.year || "";
                const location = item.location || "";
                const saved = isItemSaved(title, originTab);
                return (
                    <div key={`${title}-${index}`} className={`group relative overflow-hidden h-[550px] ${theme.cardBg} animate-fade-in`}>
                        <div className="absolute inset-0 z-10">
                            {img ? <img src={img} className="w-full h-full object-cover grayscale opacity-90 transition-transform duration-700 group-hover:scale-110" /> : <div className={`w-full h-full ${theme.placeholderBg} flex items-center justify-center text-[10px] uppercase tracking-widest opacity-20`}>No Image Provided</div>}
                        </div>
                        <div className={`absolute bottom-0 left-0 w-full p-8 bg-gradient-to-t ${darkMode ? 'from-[#1C1C1E] via-[#1C1C1E]/80' : 'from-white via-white/80'} to-transparent z-20 group-hover:opacity-0 transition-opacity duration-300`}>
                            <h3 className={`font-serif text-2xl italic leading-tight ${darkMode ? 'text-[#F5EFE6]' : 'text-[#001F3F]'}`}>{title}</h3>
                            <p className={`text-[10px] uppercase tracking-[0.3em] font-bold opacity-50 ${darkMode ? 'text-[#F5EFE6]' : 'text-[#001F3F]'}`}>{sub}</p>
                        </div>
                        <div className={`absolute inset-0 ${darkMode ? 'bg-[#F5EFE6] text-[#121212]' : 'bg-[#001F3F] text-[#E6F0FA]'} opacity-0 group-hover:opacity-100 transition-all duration-500 z-40 flex flex-col p-10`}>
                            <div className="flex justify-between items-start">
                                <div><h3 className="font-serif text-3xl italic mb-2">{title}</h3><p className={`text-[10px] uppercase tracking-widest font-bold opacity-50 mb-6 border-b ${darkMode ? 'border-[#121212]/20' : 'border-[#E6F0FA]/20'} pb-4`}>{sub}</p></div>
                                <span className="text-[7px] uppercase tracking-widest border border-current px-2 py-0.5 rounded opacity-40">{originTab}</span>
                            </div>
                            <div className="mb-6 space-y-1 text-[9px] uppercase tracking-[0.2em] opacity-60 italic font-light">
                                {album && <p>Album: {album}</p>}{year && <p>Released: {year}</p>}{location && <p>Location: {location}</p>}
                            </div>
                            <div className="flex-grow overflow-y-auto custom-scroll mb-8 pr-2"><p className="text-xs font-light leading-relaxed italic opacity-90">{bodyText ? `"${bodyText}"` : "Editorial pending."}</p></div>
                            <div className="mt-auto flex flex-col space-y-2">
                                {finalLink && <a href={finalLink} target="_blank" className={`border ${darkMode ? 'border-[#121212]' : 'border-[#E6F0FA]'} hover:bg-transparent ${darkMode ? 'hover:text-[#121212] bg-[#121212] text-[#F5EFE6]' : 'hover:text-[#001F3F] bg-[#001F3F] text-[#E6F0FA]'} py-4 text-[9px] uppercase tracking-[0.4em] font-bold text-center transition-all`}>{originTab === 'Songs' ? "Listen on Spotify" : originTab === 'Articles' ? "Read Publication" : "Website"}</a>}
                                <button onClick={() => toggleFavorite(item, originTab)} className={`border ${darkMode ? 'border-[#121212]/30 hover:bg-[#121212] hover:text-[#F5EFE6]' : 'border-[#E6F0FA]/30 hover:bg-[#E6F0FA] hover:text-[#001F3F]'} py-2 text-[8px] uppercase tracking-[0.3em] font-bold text-center transition-all`}>{saved ? "✕ Remove from Collection" : "✓ Save to Collection"}</button>
                            </div>
                        </div>
                    </div>
                );
            };

            // ---------- HOMEPAGE (tight but readable, subscribe button fully visible) ----------
            const renderHome = () => (
                <div className="home-container w-full max-w-4xl mx-auto px-4 py-2">
                    {/* Title and byline */}
                    <div className="text-center mb-3">
                        <h1 className="font-serif text-5xl md:text-6xl italic tracking-tighter leading-tight">The Last Chord</h1>
                        <p className="text-[10px] uppercase tracking-[0.5em] font-bold opacity-40 mt-1">BY TRISHA RAI | EST. 2025</p>
                    </div>

                    {/* READ ON SUBSTACK button */}
                    <div className="flex justify-center my-2">
                        <a href="https://thelastchord.substack.com" target="_blank" className={`text-[10px] uppercase tracking-[0.4em] font-bold border ${darkMode ? 'border-[#F5EFE6]/50 hover:border-[#F5EFE6]' : 'border-[#001F3F]/40 hover:border-[#001F3F]'} px-5 py-1.5 transition-all hover:scale-[0.98]`}>
                            READ ON SUBSTACK →
                        </a>
                    </div>

                    {/* Clickable logo */}
                    <div className="flex justify-center my-2">
                        <div className="relative cursor-pointer group" onClick={() => setShowAboutPanel(!showAboutPanel)}>
                            <img 
                                src="https://trishrai.github.io/thelastchord/Logo.jpeg" 
                                alt="The Last Chord Logo — click to read about the founder" 
                                className="w-28 h-28 md:w-36 md:h-36 rounded-full object-cover shadow-xl border-2 border-white/30 transition-all duration-300 group-hover:scale-105 group-hover:shadow-2xl"
                            />
                            <div className="absolute inset-0 rounded-full bg-black/0 group-hover:bg-black/20 transition-all duration-300 flex items-center justify-center opacity-0 group-hover:opacity-100">
                                <span className="text-white text-[10px] font-bold uppercase tracking-wider bg-black/60 px-2 py-1 rounded-full backdrop-blur-sm">click to read</span>
                            </div>
                        </div>
                    </div>
                    
                    {/* Hint text */}
                    <p className="text-center text-[9px] uppercase tracking-[0.3em] opacity-50 mt-1 cursor-pointer hover:opacity-90 font-medium" onClick={() => setShowAboutPanel(!showAboutPanel)}>
                        ↑ CLICK TO LEARN ABOUT THE LAST CHORD
                    </p>

                    {/* About panel (appears above subscribe form) */}
                    {showAboutPanel && (
                        <div className={`mt-3 mb-3 p-4 rounded-xl border ${darkMode ? 'bg-[#1C1C1E]/95 border-[#F5EFE6]/20' : 'bg-white/95 border-[#001F3F]/10'} shadow-lg animate-fade-in max-w-2xl mx-auto`}>
                            <div className="flex justify-between items-start mb-2">
                                <h2 className="font-serif text-xl italic">About The Last Chord</h2>
                                <button onClick={() => setShowAboutPanel(false)} className="text-[9px] uppercase tracking-wider opacity-50 hover:opacity-100">✕ close</button>
                            </div>
                            <div className="space-y-2 text-xs leading-relaxed opacity-90">
                                <p>Founded by Trisha Rai, The Last Chord is a platform dedicated to exploring the intersection between technology, culture, and our daily lives. Rai was born in India and raised in Hong Kong before moving to London in 2020 to pursue her undergraduate studies at the London School of Economics and Political Science. It was during this time that Rai became captivated by the profound ways technology shapes everyday experiences.</p>
                                <p>Driven by a desire to bridge the gap between complex digital shifts and human-centric storytelling, Rai founded The Last Chord in 2025. Whether dissecting the latest pop culture phenomena or analysing the implications of emerging AI policies, every piece on the site is researched, developed, edited, and written by Rai.</p>
                                <p>Currently, Rai is pursuing a Master’s in Digital Humanities at University College London, where her research focuses on the evolving relationship between technology, culture, and artificial intelligence. Rai continues to run, edit, and write for The Last Chord full-time, building a space for thoughtful discussion and debate on the things that matter most.</p>
                                <div className="pt-2 border-t border-dashed opacity-10 text-[8px] uppercase tracking-wider font-mono">⚡ This entire web app, from interface to logic, has been personally coded, built, and developed by Trisha Rai.</div>
                            </div>
                        </div>
                    )}

                    {/* Subscribe form - compact enough to fit without scroll */}
                    <div className={`max-w-md mx-auto w-full mt-3 p-4 rounded-xl shadow-md border ${theme.formCard} transition-all`}>
                        <h3 className="font-serif text-xl italic tracking-tight mb-0 text-center">Subscribe To The Last Chord</h3>
                        <p className="text-[8px] uppercase tracking-[0.3em] opacity-60 text-center mb-3">Join The Last Chord's Newsletter</p>
                        <form onSubmit={handleSubscribe} className="flex flex-col space-y-3">
                            {signupStatus !== 'success' ? (
                                <>
                                    <div className="grid grid-cols-2 gap-3">
                                        <input type="text" name="firstName" placeholder="FIRST NAME" disabled={signupStatus === 'loading'} value={formData.firstName} onChange={handleFormChange} className={`w-full bg-transparent border-b ${darkMode ? 'border-[#F5EFE6]/40 focus:border-[#F5EFE6]' : 'border-[#001F3F]/30 focus:border-[#001F3F]'} py-1.5 text-[10px] uppercase tracking-wider outline-none transition-all placeholder:opacity-50`} required />
                                        <input type="text" name="lastName" placeholder="LAST NAME" disabled={signupStatus === 'loading'} value={formData.lastName} onChange={handleFormChange} className={`w-full bg-transparent border-b ${darkMode ? 'border-[#F5EFE6]/40 focus:border-[#F5EFE6]' : 'border-[#001F3F]/30 focus:border-[#001F3F]'} py-1.5 text-[10px] uppercase tracking-wider outline-none transition-all placeholder:opacity-50`} />
                                    </div>
                                    <div>
                                        <select onChange={handleCitySelect} value={showCustomCity ? "Other (specify)" : formData.city} className={`w-full bg-transparent border-b ${darkMode ? 'border-[#F5EFE6]/40 focus:border-[#F5EFE6]' : 'border-[#001F3F]/30 focus:border-[#001F3F]'} py-1.5 text-[10px] uppercase tracking-wider outline-none transition-all`}>
                                            <option value="">Select City</option>
                                            <option value="London">London</option>
                                            <option value="Manchester">Manchester</option>
                                            <option value="New York">New York</option>
                                            <option value="Los Angeles">Los Angeles</option>
                                            <option value="Tokyo">Tokyo</option>
                                            <option value="Hong Kong">Hong Kong</option>
                                            <option value="Singapore">Singapore</option>
                                            <option value="Mumbai">Mumbai</option>
                                            <option value="Delhi">Delhi</option>
                                            <option value="Berlin">Berlin</option>
                                            <option value="Paris">Paris</option>
                                            <option value="Toronto">Toronto</option>
                                            <option value="Sydney">Sydney</option>
                                            <option value="Dubai">Dubai</option>
                                            <option value="San Francisco">San Francisco</option>
                                            <option value="Austin">Austin</option>
                                            <option value="Chicago">Chicago</option>
                                            <option value="Other (specify)">Other (specify)</option>
                                        </select>
                                        {showCustomCity && (
                                            <input type="text" placeholder="Please type your city" value={customCityValue} onChange={handleCustomCityChange} className={`mt-1 w-full bg-transparent border-b ${darkMode ? 'border-[#F5EFE6]/40 focus:border-[#F5EFE6]' : 'border-[#001F3F]/30 focus:border-[#001F3F]'} py-1.5 text-[10px] uppercase tracking-wider outline-none transition-all placeholder:opacity-50`} />
                                        )}
                                    </div>
                                    <div>
                                        <input type="email" name="email" required placeholder="EMAIL ADDRESS" disabled={signupStatus === 'loading'} value={formData.email} onChange={handleFormChange} className={`w-full bg-transparent border-b ${darkMode ? 'border-[#F5EFE6]/40 focus:border-[#F5EFE6]' : 'border-[#001F3F]/30 focus:border-[#001F3F]'} py-1.5 text-[10px] uppercase tracking-wider outline-none transition-all placeholder:opacity-50`} />
                                    </div>
                                    <button type="submit" disabled={signupStatus === 'loading'} className={`mt-0 text-[9px] uppercase tracking-[0.4em] font-bold py-2 border ${darkMode ? 'border-[#F5EFE6] hover:bg-[#F5EFE6] hover:text-[#121212]' : 'border-[#001F3F] hover:bg-[#001F3F] hover:text-white'} transition-all disabled:opacity-30`}>
                                        {signupStatus === 'loading' ? 'LOADING...' : 'SUBSCRIBE →'}
                                    </button>
                                </>
                            ) : (
                                <div className="py-2 text-center space-y-0">
                                    <p className="text-[9px] uppercase tracking-[0.3em] text-emerald-600 dark:text-emerald-400 font-bold">✓ SUBSCRIBED</p>
                                    <p className="text-[7px] uppercase tracking-[0.2em] opacity-60">You're on the list. Welcome to The Last Chord.</p>
                                </div>
                            )}
                            {signupStatus === 'error' && <p className="text-[7px] uppercase tracking-[0.3em] text-rose-500 dark:text-rose-400 font-bold text-center">X transmission failed. Please try again.</p>}
                        </form>
                    </div>
                </div>
            );

            const renderContent = () => {
                if (viewingCollection) {
                    return (
                        <div className="flex flex-col w-full">
                            <div className="w-full px-4 md:px-8 max-w-xl mx-auto mb-8 mt-2 flex flex-col items-center space-y-6 animate-fade-in">
                                <div className="text-center"><h2 className="font-serif text-4xl italic tracking-tight mb-2">My Collection</h2><p className="text-[10px] uppercase tracking-[0.3em] opacity-50">Centralised Vault</p></div>
                                <div className="flex flex-col items-center space-y-2 w-full max-w-xs">
                                    <label className="text-[8px] uppercase tracking-[0.3em] opacity-40 font-bold">Sort Vault Category</label>
                                    <select value={collectionSubFilter} onChange={(e) => setCollectionSubFilter(e.target.value)} className={`w-full bg-transparent border ${darkMode ? 'border-[#F5EFE6]/30 text-[#F5EFE6] bg-[#1C1C1E]' : 'border-[#001F3F]/20 text-[#001F3F] bg-white'} px-4 py-3 text-[10px] uppercase tracking-widest outline-none rounded-none cursor-pointer font-bold`}>
                                        <option value="All">All Saved Items</option><option value="Songs">Songs</option><option value="Articles">Articles</option><option value="London">London</option><option value="News in Tech">News in Tech</option>
                                    </select>
                                </div>
                                <input type="text" placeholder="Search..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className={`w-full max-w-xs bg-transparent border-b ${darkMode ? 'border-[#F5EFE6]/30 focus:border-[#F5EFE6]' : 'border-[#001F3F]/20 focus:border-[#001F3F]'} py-2 text-xs uppercase tracking-widest outline-none text-center transition-colors font-light placeholder:opacity-40`} />
                            </div>
                            {filteredCollectionItems.length === 0 ? (
                                <div className="flex flex-col items-center justify-center py-40 px-6 text-center animate-fade-in opacity-40">
                                    <p className="font-serif text-xl italic mb-2">No Records Found!</p>
                                    <p className="text-[10px] uppercase tracking-widest font-light">Start Saving To Add To Your Collection</p>
                                </div>
                            ) : (
                                <div className={`grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 grid-layout ${theme.layoutGrid} p-0.5 pb-80`}>{filteredCollectionItems.map((f, i) => renderCard(f.data, f.originTab, i))}</div>
                            )}
                        </div>
                    );
                }
                if (activeTab === 'Home') return renderHome();
                if (activeTab === 'Articles') {
                    return (
                        <div className="flex flex-col w-full">
                            <div className="w-full px-4 md:px-8 max-w-xl mx-auto mb-8 mt-2 flex flex-col items-center space-y-4 animate-fade-in">
                                <div className="flex items-center space-x-6 text-[10px] uppercase tracking-[0.2em] font-bold">
                                    {selectedCategory !== 'Landing' && <button onClick={() => { setSelectedCategory('Landing'); setSearchQuery(''); }} className="opacity-50 hover:opacity-100 transition-opacity flex items-center space-x-1"><span>← Index Deck</span></button>}
                                    <span className={`pb-1 ${darkMode ? 'border-[#F5EFE6]' : 'border-[#001F3F]'}`}>{searchQuery.trim() !== '' ? 'Search Results' : selectedCategory === 'All' ? 'All Pieces' : selectedCategory !== 'Landing' ? selectedCategory.split(':')[0] : 'Editorial Registry'}</span>
                                </div>
                                {selectedCategory === 'All' && searchQuery.trim() === '' && <div className="flex items-center space-x-4 text-[9px] uppercase tracking-[0.15em] opacity-60"><button onClick={() => setSortOrder('newest')} className={`transition-all ${sortOrder === 'newest' ? 'font-bold underline opacity-100' : 'hover:opacity-100'}`}>Newest First</button><span>|</span><button onClick={() => setSortOrder('oldest')} className={`transition-all ${sortOrder === 'oldest' ? 'font-bold underline opacity-100' : 'hover:opacity-100'}`}>Oldest First</button></div>}
                                <input type="text" placeholder="Search..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className={`w-full max-w-xs bg-transparent border-b ${darkMode ? 'border-[#F5EFE6]/30 focus:border-[#F5EFE6]' : 'border-[#001F3F]/20 focus:border-[#001F3F]'} py-2 text-xs uppercase tracking-widest outline-none text-center transition-colors font-light placeholder:opacity-40`} />
                            </div>
                            {selectedCategory === 'Landing' && searchQuery.trim() === '' ? (
                                <div className="w-full px-4 md:px-8 max-w-5xl mx-auto py-2 animate-fade-in flex flex-col items-center">
                                    <div className="text-center mb-8"><h2 className="font-serif text-4xl italic tracking-tight mb-2">Editorial Registry</h2><p className="text-[10px] uppercase tracking-[0.3em] opacity-50">Select an archive sector or search all articles</p></div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 w-full mb-40">
                                        {Object.keys(CATEGORY_MAP).map((key) => {
                                            const cat = CATEGORY_MAP[key];
                                            const isHovered = hoveredCategory === key;
                                            return (<div key={key} onClick={() => setSelectedCategory(key)} onMouseEnter={() => setHoveredCategory(key)} onMouseLeave={() => setHoveredCategory(null)} className={`border ${darkMode ? 'border-[#F5EFE6]/20 hover:bg-[#F5EFE6] hover:text-[#121212]' : 'border-[#001F3F]/20 hover:bg-[#001F3F] hover:text-[#E6F0FA]'} p-8 h-56 flex flex-col justify-center items-center text-center cursor-pointer transition-all duration-300 relative group`}>
                                            {isHovered ? <p className="text-xs italic leading-relaxed px-2 font-light tracking-wide animate-fade-in">{cat.desc}</p> : <div className="flex flex-col items-center space-y-3"><span className={`text-[9px] font-bold uppercase tracking-[0.2em] px-3 py-1 rounded-full ${cat.pillBg} ${cat.pillText}`}>{cat.title.split(':')[0]}</span><h3 className="font-serif text-xl italic tracking-tight">{cat.title.includes(':') ? cat.title.split(':')[1].trim() : cat.title}</h3></div>}</div>);
                                        })}
                                        <div onClick={() => setSelectedCategory('All')} className={`border border-dashed ${darkMode ? 'border-[#F5EFE6]/40 hover:bg-[#F5EFE6] hover:text-[#121212]' : 'border-[#001F3F]/30 hover:bg-[#001F3F] hover:text-[#E6F0FA]'} p-8 h-56 flex flex-col justify-center items-center text-center cursor-pointer transition-all duration-300 group`}><h3 className="text-xs uppercase tracking-[0.4em] font-bold">Browse All Articles</h3></div>
                                    </div>
                                </div>
                            ) : filteredStandardItems.length === 0 ? (
                                <div className="flex flex-col items-center justify-center py-40 px-6 text-center animate-fade-in opacity-40"><p className="font-serif text-xl italic mb-2">No elements found.</p><p className="text-[10px] uppercase tracking-widest font-light leading-relaxed">Adjust your filter or search criteria.</p></div>
                            ) : (
                                <div className={`grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 grid-layout ${theme.layoutGrid} p-0.5 pb-80`}>{filteredStandardItems.map((item, i) => renderCard(item, 'Articles', i))}</div>
                            )}
                        </div>
                    );
                }
                return (
                    <div className="flex flex-col w-full">
                        <div className="page-header-center w-full px-4 md:px-8 max-w-xl mx-auto mb-8 mt-2 flex flex-col items-center space-y-4 animate-fade-in">
                            <div className="text-[10px] uppercase tracking-[0.2em] font-bold"><span className={`pb-1 ${darkMode ? 'border-[#F5EFE6]' : 'border-[#001F3F]'}`}>{activeTab}</span></div>
                            <input type="text" placeholder="Search..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className={`w-full max-w-xs bg-transparent border-b ${darkMode ? 'border-[#F5EFE6]/30 focus:border-[#F5EFE6]' : 'border-[#001F3F]/20 focus:border-[#001F3F]'} py-2 text-xs uppercase tracking-widest outline-none text-center transition-colors font-light placeholder:opacity-40`} />
                        </div>
                        {filteredStandardItems.length === 0 ? (
                            <div className="flex flex-col items-center justify-center py-40 px-6 text-center animate-fade-in opacity-40"><p className="font-serif text-xl italic mb-2">No elements found.</p><p className="text-[10px] uppercase tracking-widest font-light leading-relaxed">Adjust your filter or search criteria.</p></div>
                        ) : (
                            <div className={`grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 grid-layout ${theme.layoutGrid} p-0.5 pb-80`}>{filteredStandardItems.map((item, i) => renderCard(item, activeTab, i))}</div>
                        )}
                    </div>
                );
            };

            return (
                <div className={`min-h-screen flex flex-col ${theme.bg} ${theme.text}`}>
                    <nav className={`fixed top-0 w-full ${theme.navBg} backdrop-blur-md z-50 px-6 md:px-8 py-3 flex justify-between items-center border-b ${theme.border}`}>
                        <div className="flex items-center space-x-4">
                            <button onClick={() => { setActiveTab('Home'); setViewingCollection(false); }} className="hover:opacity-70 transition-opacity"><img src="https://trishrai.github.io/thelastchord/Logo.jpeg" alt="TLC" className="h-8 w-8 md:h-10 md:w-10 rounded-full object-cover border shadow-sm" /></button>
                            <button onClick={() => setDarkMode(!darkMode)} className={`text-[8px] uppercase tracking-[0.3em] px-3 py-1 border ${darkMode ? 'border-[#F5EFE6]/30 text-[#F5EFE6]/60 hover:text-[#F5EFE6]' : 'border-[#001F3F]/20 text-[#001F3F]/60 hover:text-[#001F3F]'} rounded transition-all`}>{darkMode ? "Light Mode" : "Dark Mode"}</button>
                        </div>
                        <div className="hidden lg:block text-center flex-grow"><h2 className="text-[9px] md:text-[10px] uppercase tracking-[0.4em] font-bold opacity-70">{getPageHeader(activeTab)}</h2></div>
                        <div className="flex items-center space-x-4">
                            <button onClick={() => { setViewingCollection(!viewingCollection); setSearchQuery(''); }} className={`text-[9px] uppercase tracking-[0.2em] font-bold px-3 py-1.5 border ${viewingCollection ? (darkMode ? 'bg-[#F5EFE6] text-[#121212]' : 'bg-[#001F3F] text-[#D1E2F2]') : 'border-transparent'} transition-all rounded flex items-center space-x-1`}><span>My Collection ({favorites.length})</span></button>
                            <div className={`text-[9px] uppercase tracking-[0.5em] font-bold px-4 py-1.5 border ${theme.pillBorder} rounded-full hidden sm:block`}>{viewingCollection ? "Vault" : activeTab}</div>
                        </div>
                    </nav>
                    <main className="pt-16 flex-grow mx-auto w-full max-w-[1600px]">{renderContent()}</main>
                    <footer className={`fixed bottom-0 w-full ${theme.footerBg} backdrop-blur-md border-t ${theme.border} flex justify-around py-3 px-4 text-[10px] uppercase font-bold tracking-[0.2em] z-50 shadow-sm`}>
                        {['Home', 'Songs', 'London', 'Articles', 'New In Tech'].map(tab => (<button key={tab} onClick={() => { setActiveTab(tab); setViewingCollection(false); }} className={(!viewingCollection && activeTab === tab) ? `scale-105 transition-transform border-b-2 ${darkMode ? 'border-[#F5EFE6] text-[#F5EFE6]' : 'border-[#001F3F] text-[#001F3F]'} pb-0.5` : "opacity-40 hover:opacity-100 transition-all pb-0.5"}>{tab}</button>))}
                    </footer>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
